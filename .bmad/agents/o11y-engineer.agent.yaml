      ## Method 2: eBPF-Based Auto-Instrumentation
      
      ### Option A: Beyla (by Grafana)
      
      **Supports:** Go, Rust, C/C++, Java, .NET, Node.js, Python, Ruby
````yaml
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: beyla
        namespace: observability
      spec:
        selector:
          matchLabels:
            app: beyla
        template:
          metadata:
            labels:
              app: beyla
          spec:
            hostPID: true  # Required for eBPF
            containers:
            - name: beyla
              image: grafana/beyla:latest
              securityContext:
                privileged: true  # Required for eBPF
              env:
                - name: BEYLA_OPEN_PORT
                  value: "8080,443"  # Ports to instrument
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: "http://otelcol:4317"
                - name: OTEL_SERVICE_NAME
                  value: "auto-discovered"  # Or set specific name
              volumeMounts:
              - name: sys
                mountPath: /sys
                readOnly: true
            volumes:
            - name: sys
              hostPath:
                path: /sys
````
      
      ### Option B: Odigos
      
      **Supports:** Go, Java, Python, .NET, Node.js
````bash
      # Install Odigos via Helm
      helm repo add odigos https://keyval-dev.github.io/odigos-charts/
      helm install odigos odigos/odigos --namespace odigos-system --create-namespace
      
      # Install Odigos CLI
      brew install keyval-dev/homebrew-odigos-cli/odigos
      
      # Configure Odigos
      odigos install
      
      # Add instrumentation to namespace
      odigos instrument namespace default
      
      # Configure destination (OTel Collector)
      odigos destination add otlp-collector \
        --type otlp \
        --endpoint http://otelcol.observability:4317
````
      
      ## Method 3: Language-Specific Agents
      
      ### Java (No code changes)
````dockerfile
      FROM openjdk:17-slim
      
      # Download OpenTelemetry Java agent
      ADD https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/latest/download/opentelemetry-javaagent.jar /opt/
      
      COPY target/myapp.jar /app.jar
      
      # Add agent to JVM
      ENV JAVA_TOOL_OPTIONS="-javaagent:/opt/opentelemetry-javaagent.jar"
      ENV OTEL_SERVICE_NAME="payment-service"
      ENV OTEL_EXPORTER_OTLP_ENDPOINT="http://otelcol:4317"
      ENV OTEL_RESOURCE_ATTRIBUTES="service.version=1.2.3,deployment.environment=production"
      
      ENTRYPOINT ["java", "-jar", "/app.jar"]
````
      
      ### Python (via opentelemetry-instrument)
````dockerfile
      FROM python:3.11-slim
      
      WORKDIR /app
      
      # Install dependencies
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      
      # Install OpenTelemetry auto-instrumentation
      RUN pip install opentelemetry-distro opentelemetry-exporter-otlp
      RUN opentelemetry-bootstrap -a install
      
      COPY . .
      
      ENV OTEL_SERVICE_NAME="payment-service"
      ENV OTEL_EXPORTER_OTLP_ENDPOINT="http://otelcol:4317"
      ENV OTEL_RESOURCE_ATTRIBUTES="service.version=1.2.3,deployment.environment=production"
      
      # Run with auto-instrumentation
      CMD ["opentelemetry-instrument", "python", "app.py"]
````
      
      ### Node.js (via require hook)
````dockerfile
      FROM node:18-slim
      
      WORKDIR /app
      
      # Install dependencies
      COPY package*.json ./
      RUN npm install
      
      # Install OpenTelemetry packages
      RUN npm install --save @opentelemetry/api \
                            @opentelemetry/auto-instrumentations-node \
                            @opentelemetry/exporter-trace-otlp-grpc
      
      COPY . .
      
      ENV OTEL_SERVICE_NAME="payment-service"
      ENV OTEL_EXPORTER_OTLP_ENDPOINT="http://otelcol:4317"
      ENV OTEL_RESOURCE_ATTRIBUTES="service.version=1.2.3,deployment.environment=production"
      
      # Auto-instrument via NODE_OPTIONS
      ENV NODE_OPTIONS="--require @opentelemetry/auto-instrumentations-node/register"
      
      CMD ["node", "app.js"]
````
      
      ### .NET (via startup hook)
````dockerfile
      FROM mcr.microsoft.com/dotnet/aspnet:7.0 AS runtime
      
      WORKDIR /app
      
      # Install OpenTelemetry auto-instrumentation
      RUN apt-get update && apt-get install -y wget unzip
      RUN wget https://github.com/open-telemetry/opentelemetry-dotnet-instrumentation/releases/latest/download/otel-dotnet-auto-install.sh
      RUN sh ./otel-dotnet-auto-install.sh
      
      COPY --from=build /app/publish .
      
      ENV OTEL_SERVICE_NAME="payment-service"
      ENV OTEL_EXPORTER_OTLP_ENDPOINT="http://otelcol:4317"
      ENV OTEL_RESOURCE_ATTRIBUTES="service.version=1.2.3,deployment.environment=production"
      ENV OTEL_DOTNET_AUTO_HOME="/otel-dotnet-auto"
      ENV DOTNET_STARTUP_HOOKS="/otel-dotnet-auto/net/OpenTelemetry.AutoInstrumentation.StartupHook.dll"
      
      ENTRYPOINT ["dotnet", "MyApp.dll"]
````
      
      ## Validation Steps
      
      After enabling auto-instrumentation:
````bash
      # 1. Check pods are running
      kubectl get pods -l app=payment-service
      
      # 2. Check for OTel environment variables
      kubectl exec -it <pod-name> -- env | grep OTEL
      
      # 3. Check application logs for OTel initialization
      kubectl logs <pod-name> | grep -i "opentelemetry\|instrumentation"
      
      # Expected:
      # - "OpenTelemetry auto-instrumentation enabled"
      # - "Exporting to http://otelcol:4317"
      # - No errors about missing dependencies
      
      # 4. Check collector is receiving data
      kubectl logs -l app=otelcol -n observability | grep "TracesReceived"
      
      # 5. Verify in backend
      # - Service should appear in service list
      # - Traces should have proper attributes
      # - HTTP/DB calls should be instrumented
````
      
      ## Troubleshooting
      
      ### Issue: No traces appearing
      
      **Check:**
````bash
      # Is instrumentation annotation correct?
      kubectl get pod <pod-name> -o yaml | grep "instrumentation.opentelemetry.io"
      
      # Are OTel containers injected?
      kubectl get pod <pod-name> -o yaml | grep -A 10 "initContainers"
      
      # Is operator running?
      kubectl get pods -n opentelemetry-operator-system
      
      # Check operator logs
      kubectl logs -n opentelemetry-operator-system -l app.kubernetes.io/name=opentelemetry-operator
````
      
      ### Issue: Application failing to start
      
      **Check:**
````bash
      # Check application logs
      kubectl logs <pod-name>
      
      # Common issues:
      # - OOM (increase memory limits)
      # - Incompatible Java version
      # - Missing dependencies
      
      # Temporarily disable instrumentation to verify
      kubectl annotate deployment payment-service instrumentation.opentelemetry.io/inject-java-
````
      
      ### Issue: High overhead / performance impact
      
      **Fix:**
````yaml
      # Reduce sampling rate
      spec:
        sampler:
          type: parentbased_traceidratio
          argument: "0.01"  # 1% instead of 10%
      
      # Or disable specific instrumentations
      env:
        - name: OTEL_INSTRUMENTATION_JDBC_ENABLED
          value: "false"  # Disable JDBC instrumentation
````
      
      ## Comparison Matrix
      
      | Method | Pros | Cons | Best For |
      |--------|------|------|----------|
      | **K8s Operator** | Easy, declarative, supports multiple languages | Requires K8s, some overhead | Most K8s deployments |
      | **eBPF (Beyla)** | Zero code change, works for compiled languages | Linux only, limited customization | Go, Rust, C/C++ apps |
      | **eBPF (Odigos)** | Automatic detection, easy setup | Commercial features, learning curve | Multi-language environments |
      | **Language Agents** | Works anywhere, full control | Requires Dockerfile changes | Non-K8s deployments |
      
