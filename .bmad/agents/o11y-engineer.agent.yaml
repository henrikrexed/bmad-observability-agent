            }
          },
          {
            "name": "Error Rate",
            "tileType": "DATA_EXPLORER",
            "configured": true,
            "bounds": {
              "top": 0,
              "left": 304,
              "width": 304,
              "height": 304
            },
            "queries": [
              {
                "id": "A",
                "metric": "builtin:service.errors.total.rate",
                "spaceAggregation": "AVG",
                "timeAggregation": "DEFAULT",
                "splitBy": ["dt.entity.service"]
              }
            ],
