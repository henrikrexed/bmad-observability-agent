  - id: add-scrape-configuration
    content: |
      Add Prometheus scrape configuration to OpenTelemetry Collector.

      ## Prometheus Receiver Configuration
      ```yaml
      receivers:
        prometheus:
          config:
            scrape_configs:
              - job_name: 'kubernetes-pods'
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: keep
                    regex: true
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                    action: replace
                    target_label: __metrics_path__
                    regex: (.+)
                  - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                    action: replace
                    regex: ([^:]+)(?::\d+)?;(\d+)
                    replacement: $1:$2
                    target_label: __address__

              - job_name: 'kubernetes-services'
                kubernetes_sd_configs:
                  - role: service
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                    action: keep
                    regex: true

              - job_name: 'node-exporter'
                static_configs:
                  - targets: ['node-exporter:9100']

      service:
        pipelines:
          metrics:
            receivers: [prometheus]
            processors: [memory_limiter, batch]
            exporters: [otlp]
      ```

      ## Target Configuration with Annotations
      ```yaml
      metadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
          prometheus.io/path: "/metrics"
      ```

      ## Common Scrape Patterns
      - Kubernetes pods with annotations
      - Service discovery for services
      - Static targets for infrastructure
      - Federation from existing Prometheus

