  - id: dtctl-setup
    content: |
      Set up Dynatrace integration using dtctl (kubectl-style CLI for Dynatrace).

      ## Step 1: Install dtctl
```bash
      # Download from releases
      # https://github.com/dynatrace-oss/dtctl/releases/latest

      # macOS/Linux - download and install binary
      curl -LO https://github.com/dynatrace-oss/dtctl/releases/latest/download/dtctl-$(uname -s | tr '[:upper:]' '[:lower:]')-amd64
      chmod +x dtctl-*
      sudo mv dtctl-* /usr/local/bin/dtctl

      # Verify installation
      dtctl version

      # Enable shell completion (optional)
      dtctl completion bash > /etc/bash_completion.d/dtctl
      # or for zsh
      dtctl completion zsh > "${fpath[1]}/_dtctl"
```

      ## Step 2: Create Project Structure
```bash
      mkdir -p dynatrace-config
      cd dynatrace-config

      # Create directory structure
      mkdir -p {dashboards,notebooks,workflows,alerting,slos,synthetic}
```

      ## Step 3: Configure Contexts (Multiple Environments)
```bash
      # Configure development environment
      dtctl config set-context development \
        --environment "https://abc12345.apps.dynatrace.com" \
        --token-ref dev-token
      dtctl config set-credentials dev-token --token "dt0s16.DEV_TOKEN_HERE"

      # Configure staging environment
      dtctl config set-context staging \
        --environment "https://def67890.apps.dynatrace.com" \
        --token-ref staging-token
      dtctl config set-credentials staging-token --token "dt0s16.STAGING_TOKEN_HERE"

      # Configure production environment
      dtctl config set-context production \
        --environment "https://ghi11121.apps.dynatrace.com" \
        --token-ref prod-token
      dtctl config set-credentials prod-token --token "dt0s16.PROD_TOKEN_HERE"

      # List configured contexts
      dtctl config get-contexts

      # Switch to a context
      dtctl config use-context development
```

      ## Step 4: Create API Tokens
```bash
      # Required token scopes (see: https://github.com/dynatrace-oss/dtctl#token-scopes):
      # For read-only operations:
      # - Read settings, Read SLO, Read configuration
      # For write operations:
      # - Write settings, Write SLO, Write configuration
      # For automation:
      # - Automation workflows read/write

      # Tokens are stored securely in dtctl credentials
```

      ## Step 5: Verify Connection
```bash
      # Test connection
      dtctl get workflows

      # List dashboards
      dtctl get dashboards

      # Run a simple DQL query
      dtctl query "fetch logs | limit 5"
```

      ## Step 6: Deploy Configuration
```bash
      # Apply configuration from file
      dtctl apply -f dashboard.yaml

      # Apply all files in directory
      dtctl apply -f dashboards/

      # Dry-run to validate before applying
      dtctl apply -f workflow.yaml --dry-run

      # Apply to specific context
      dtctl apply -f dashboard.yaml --context production
```

      Generate complete Dynatrace + dtctl setup.

  - id: dtctl-create-dashboard
    content: |
      Create Dynatrace dashboard using dtctl configuration as code.
      
      ## Dashboard Templates
      
      ### Template 1: RED Metrics Dashboard
```json
      {
        "dashboardMetadata": {
          "name": "{{ .name }}",
          "shared": true,
