      </configuration>
````
````properties
      # application.properties
      logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg trace_id=%X{trace_id} span_id=%X{span_id}%n
````
      
      ### Node.js (with Winston)
````javascript
      const winston = require('winston');
      const { trace } = require('@opentelemetry/api');
      
      const logger = winston.createLogger({
        format: winston.format.combine(
          winston.format.timestamp(),
          winston.format.printf(info => {
            const span = trace.getActiveSpan();
            const spanContext = span?.spanContext();
            
            return JSON.stringify({
              timestamp: info.timestamp,
              level: info.level,
              message: info.message,
              trace_id: spanContext?.traceId || '',
              span_id: spanContext?.spanId || '',
              ...info
            });
          })
        ),
        transports: [new winston.transports.Console()]
      });
      
      // Usage
      logger.info('Processing payment', { user_id: '123', amount: 99.99 });
````
      
      ## Step 6: Configure Sampling
      
      ### Head-Based Sampling (Simple)
````yaml
      env:
        - name: OTEL_TRACES_SAMPLER
          value: "traceidratio"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "0.1"  # 10% sampling
````
      
      ### Parent-Based Sampling (Better)
````yaml
      env:
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_traceidratio"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "0.1"  # 10% sampling, but always follows parent decision
````
      
      **Note:** For production, use tail-based sampling in collector instead
      
      ## Step 7: Enable Exemplars (Metrics → Traces)
      
      ### Go
````go
      import (
          "go.opentelemetry.io/otel/sdk/metric"
      )
      
