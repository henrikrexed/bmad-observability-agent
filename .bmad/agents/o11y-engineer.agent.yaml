            "configured": true,
            "bounds": {
              "top": 0,
              "left": 0,
              "width": 304,
              "height": 304
            },
            "tileFilter": {},
            "queries": [
              {
                "id": "A",
                "metric": "builtin:service.request.count",
                "spaceAggregation": "SUM",
                "timeAggregation": "DEFAULT",
