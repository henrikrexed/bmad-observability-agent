  - id: configure-mcp-rules
    content: |
      Generate IDE-specific Dynatrace MCP rule files with project-aware DQL queries.

      ## Overview

      MCP rules are IDE configuration files that embed Dynatrace DQL queries and
      observability context directly into the developer's AI assistant. This enables
      context-aware completions, diagnostics, and monitoring from within the IDE.

      ## Workflow

      ### Step 1: Detect IDE Type

      Ask the user which IDE/AI assistant they use:

      | IDE | Rule File Location | Format |
      |-----|-------------------|--------|
      | Claude Code | `.claude/commands/` | Markdown |
      | Cursor | `.cursor/rules/` | `.mdc` |
      | Windsurf | `.windsurfrules/` | Markdown |
      | Copilot | `.github/copilot-instructions.md` | Markdown |
      | Amazon Q | `.amazonq/rules/` | Markdown |

      ### Step 2: Scan Project Context

      Analyze the project to understand its observability landscape:

      1. **Scan codebase** for:
         - Service names (from package.json, pom.xml, go.mod, etc.)
         - Framework detection (Express, Spring Boot, Gin, etc.)
         - OpenTelemetry SDK usage (imports, span creation)
         - Database connections (connection strings, ORM configs)
         - External API calls (HTTP clients, gRPC stubs)

      2. **Scan Kubernetes manifests** for:
         - Deployment names and namespaces
         - Service definitions
         - ConfigMaps with collector configs
         - Instrumentation CRDs

      3. **Scan Helm charts** for:
         - Values files with service names
         - Template variables
         - Namespace definitions

      ### Step 3: Collect Deployment Context

      Ask the user:
      - **Kubernetes cluster name** (if applicable)
      - **Namespace** where services are deployed
      - **Dynatrace environment URL** (if not already configured)
      - **Additional services** to include in rules

      ### Step 4: Generate DQL Queries

      For each discovered service, generate DQL queries:

      ```dql
      // Service health overview
      fetch spans
      | filter service.name == "{service_name}"
      | filter k8s.namespace.name == "{namespace}"
      | summarize count=count(), error_count=countIf(status.code == "ERROR"),
                  avg_duration=avg(duration), p95_duration=percentile(duration, 95)

      // Error analysis
      fetch spans
      | filter service.name == "{service_name}"
      | filter status.code == "ERROR"
      | sort start_time desc
      | limit 20
      | fields start_time, span.name, error.message, trace_id

      // Log correlation
      fetch logs
      | filter k8s.namespace.name == "{namespace}"
      | filter service.name == "{service_name}"
      | filter loglevel == "ERROR"
      | sort timestamp desc
      | limit 50

      // Latency breakdown by route
      fetch spans
      | filter service.name == "{service_name}"
      | filter span.kind == "SERVER"
      | summarize p50=percentile(duration,50)/1000000,
                  p95=percentile(duration,95)/1000000,
                  p99=percentile(duration,99)/1000000,
                  by:{http.route}
      ```

      ### Step 5: Generate Rule File

      Generate the rule file in the IDE-specific format:

      **Claude Code format** (`.claude/commands/o11y/check-service.md`):
      ```markdown
      # Check Service Health

      Use the Dynatrace MCP server to check the health of the service.

      ## Service Context
      - Service: {service_name}
      - Namespace: {namespace}
      - Cluster: {cluster_name}

      ## DQL Queries
      [Include generated queries]

      ## Instructions
      1. Run the health overview query
      2. If error_count > 0, run the error analysis query
      3. Correlate with logs using trace_id
      4. Report latency percentiles
      ```

      **Cursor format** (`.cursor/rules/o11y-{service}.mdc`):
      ```
      ---
      description: Observability rules for {service_name}
      globs: ["src/**/*.{ts,js,py,go,java}"]
      ---

      # Observability Context for {service_name}

      When working on this service, use these Dynatrace queries for debugging:

      [Include generated queries]
      ```

      ### Step 6: Document Generated Rules

      Create a summary of all generated rules at `observability-specs/mcp-rules-manifest.yaml`:
      ```yaml
      generated_at: {timestamp}
      ide: {ide_type}
      services:
        - name: {service_name}
          namespace: {namespace}
          rule_file: {path_to_rule_file}
          queries:
            - health_overview
            - error_analysis
            - log_correlation
            - latency_breakdown
      ```

      ## Important Notes

      - Rule files go in the **project directory**, not a global location
      - DQL queries use **actual service names** discovered from the project
      - Queries include **namespace and cluster** filters for accuracy
      - Rules should be **version-controlled** alongside the project code
      - Regenerate rules when services are added or renamed

  - id: generate-observability-spec
    content: |
      Generate a comprehensive observability specification defining trace, metric, log,
      and correlation contracts for a service or set of services.

      ## Overview

      An observability spec is a use-case-driven document that defines WHAT telemetry
      data a service should produce, WHY it matters, and HOW to validate it. It serves
      as the contract between the development team (who instruments) and the operations
      team (who monitors).

      ## Workflow

      ### Step 1: Identify Services

      Scan the project to identify services that need specs:
      - Read package.json, pom.xml, go.mod, Dockerfile, docker-compose.yaml
      - Check for existing instrumentation (OTel SDK imports)
      - Identify service dependencies (databases, message queues, external APIs)

      ### Step 2: Define Use Cases

      For each service, work with the user to define observability use cases.
      Each use case is a **question that telemetry should answer**:

      ```yaml
      use_cases:
        - id: uc-001
          question: "What is the p95 latency for user registration?"
          signal: traces
          answer_method: "Filter spans by service + operation, compute p95 duration"
          slo_boundary: "p95 < 500ms"
          priority: critical

        - id: uc-002
          question: "How many payment errors occurred in the last hour?"
          signal: metrics
          answer_method: "Query payment_errors_total counter"
          slo_boundary: "error_rate < 0.1%"
          priority: critical

        - id: uc-003
          question: "What caused this specific request to fail?"
          signal: traces + logs
          answer_method: "Trace ID correlation between spans and structured logs"
          priority: high
      ```

      ### Step 3: Define Trace Contracts

      For each service, specify the expected spans:

      ```yaml
      trace_contracts:
        service_name: "registration-service"
        spans:
          - name: "POST /api/register"
            kind: SERVER
            attributes:
              app_managed:
                - http.route: "/api/register"
                - http.method: "POST"
                - http.status_code: "{dynamic}"
                - user.type: "{business_attribute}"
              collector_managed:
                - k8s.pod.name: "{auto}"
                - k8s.namespace.name: "{auto}"
                - deployment.environment: "{auto}"
              redacted:
                - user.email: "REDACTED by transform processor"
            children:
              - name: "db.query INSERT users"
                kind: CLIENT
                attributes:
                  app_managed:
                    - db.system: "postgresql"
                    - db.operation: "INSERT"
                    - db.sql.table: "users"
              - name: "POST /api/notifications"
                kind: CLIENT
                attributes:
                  app_managed:
                    - http.method: "POST"
                    - peer.service: "notification-service"

          boundary_types:
            internal:
              - "registration-service → notification-service"
            external:
              - "registration-service → payment-gateway (external)"
      ```

      ### Step 4: Define Log Contracts

      ```yaml
      log_contracts:
        service_name: "registration-service"
        structured_fields:
          required:
            - trace_id: "W3C trace context"
            - span_id: "W3C span context"
            - service.name: "registration-service"
            - level: "INFO|WARN|ERROR"
            - message: "human-readable description"
          optional:
            - user.id: "anonymized user identifier"
            - error.type: "exception class name"
            - error.message: "exception message"
        log_levels:
          ERROR: "Unrecoverable failures, exceptions"
          WARN: "Degraded operation, retries, fallbacks"
          INFO: "Business events (registration success, payment processed)"
          DEBUG: "Internal state for troubleshooting (disabled in production)"
      ```

      ### Step 5: Define Metric Contracts

      ```yaml
      metric_contracts:
        service_name: "registration-service"
        metrics:
          - name: "http.server.request.duration"
            type: histogram
            unit: ms
            description: "Server request duration"
            attributes: [http.route, http.method, http.status_code]
            semconv: "stable"

          - name: "registration.success.total"
            type: counter
            unit: "{count}"
            description: "Total successful registrations"
            attributes: [user.type]
            semconv: "custom"
            namespace: "app.registration"

          - name: "registration.error.total"
            type: counter
            unit: "{count}"
            description: "Total failed registrations"
            attributes: [error.type, user.type]
            semconv: "custom"
            namespace: "app.registration"
      ```

      ### Step 6: Define Correlation Contracts

      ```yaml
      correlation_contracts:
        trace_to_log:
          method: "trace_id field in structured logs"
          requirement: "All log entries within a traced operation MUST include trace_id and span_id"

        trace_to_metric:
          method: "exemplars on histograms"
          requirement: "Duration histograms SHOULD include trace_id as exemplar"

        log_to_metric:
          method: "shared attributes"
          requirement: "Metrics and logs MUST use identical attribute names and values"

        cross_service:
          method: "W3C Trace Context propagation"
          requirement: "All HTTP calls MUST propagate traceparent header"
      ```

      ### Step 7: Generate Companion Epic

      After the spec is complete, generate a companion epic with stories:

      - Each use case becomes one or more stories
      - Stories use BMAD standard format
      - Stories include `spec_reference` pointing to the relevant spec section
      - Stories include `test_criteria` with testable assertions
      - Epic goes to `_bmad-output/epics/`

      ### Step 8: Save the Spec

      Save the observability spec to `observability-specs/{service-name}-spec.yaml`

      ## Output Format

      The complete spec file includes:
      - `metadata` (service, version, created_by, approved_by)
      - `use_cases` (questions telemetry answers)
      - `trace_contracts` (expected spans and attributes)
      - `log_contracts` (structured log requirements)
      - `metric_contracts` (expected metrics)
      - `correlation_contracts` (how signals link together)
      - `attribute_ownership` (app_managed vs collector_managed vs redacted)
      - `collector_requirements` (processors, exporters needed)

      ## Important Notes

      - Specs are **use-case driven** -- every contract traces back to a use case
      - Attribute ownership must be clear: app vs collector vs redacted
      - Specs should be version-controlled alongside the project
      - Changes to specs go through the change management workflow
      - Specs are the input for `validate-traces` validation

  - id: validate-traces
    content: |
      Validate actual traces, metrics, and logs against the observability spec using
      Dynatrace MCP for live data queries.

      ## Overview

      This workflow compares what the observability spec says SHOULD exist against
      what ACTUALLY exists in the observability backend. It produces a validation
      report with pass/fail status and generates fix stories for any gaps.

      ## Prerequisites

      - Observability spec exists at `observability-specs/{service}-spec.yaml`
      - Dynatrace MCP server is configured (or dtctl is available)
      - Service is deployed and producing telemetry

      ## CRITICAL: Query Validation Gate (5-Step Mandatory Check)

      **BEFORE concluding that any span, metric, or log is missing or incorrect,
      you MUST validate the DQL query results using this 5-step gate:**

      ### Step 1: Verify Service Name
      ```dql
      fetch spans
      | summarize count(), by:{service.name}
      | sort count desc
      | limit 20
      ```
      Confirm the service name in the spec matches what appears in the data.
      Service names may differ due to environment prefixes, suffixes, or casing.

      ### Step 2: Verify Namespace / Environment
      ```dql
      fetch spans
      | filter service.name == "{service_name}"
      | summarize count(), by:{k8s.namespace.name}
      ```
      Confirm the namespace matches the expected deployment.

      ### Step 3: Verify Time Window
      Ensure the query time window covers a period when the service was active
      and receiving traffic. Check:
      ```dql
      fetch spans
      | filter service.name == "{service_name}"
      | summarize first_seen=min(start_time), last_seen=max(start_time)
      ```
      If `last_seen` is more than 1 hour ago, the service may not be actively
      receiving traffic. Note this in the report.

      ### Step 4: Verify Span Names
      ```dql
      fetch spans
      | filter service.name == "{service_name}"
      | summarize count(), by:{span.name}
      | sort count desc
      ```
      Compare actual span names with expected span names from the spec.
      Span names may differ due to framework conventions.

      ### Step 5: Verify Attribute Existence
      For each expected attribute, confirm it exists:
      ```dql
      fetch spans
      | filter service.name == "{service_name}"
      | filter isNotNull({attribute_name})
      | summarize count()
      ```

      **Only after ALL 5 steps pass can you conclude a span/metric/log is
      genuinely missing or incorrect.**

      ## Validation Workflow

      ### Phase 1: Load Spec
      Read the observability spec from `observability-specs/{service}-spec.yaml`

      ### Phase 2: Run Query Validation Gate
      Execute the 5-step query validation gate to confirm the data source
      is correct and accessible.

      ### Phase 3: Validate Trace Contracts
      For each expected span in the spec:

      1. Query for the span:
         ```dql
         fetch spans
         | filter service.name == "{service_name}"
         | filter span.name == "{expected_span_name}"
         | limit 10
         | fields span.name, duration, status.code, {expected_attributes}
         ```

      2. Check span existence (PASS/FAIL)
      3. Check required attributes (PASS/FAIL per attribute)
      4. Check attribute values match expected types
      5. Check parent-child relationships

      ### Phase 4: Validate Log Contracts
      For each log requirement:

      1. Query for structured logs:
         ```dql
         fetch logs
         | filter service.name == "{service_name}"
         | limit 10
         | fields {expected_fields}
         ```

      2. Check required fields exist (PASS/FAIL per field)
      3. Check trace_id correlation (PASS/FAIL)
      4. Check log levels match expectations

      ### Phase 5: Validate Metric Contracts
      For each expected metric:

      1. Query for the metric:
         ```dql
         timeseries avg({metric_name}), by:{expected_dimensions}
         ```

      2. Check metric existence (PASS/FAIL)
      3. Check dimensions match spec (PASS/FAIL per dimension)
      4. Check metric type (counter vs histogram vs gauge)

      ### Phase 6: Validate Correlation Contracts
      1. Verify trace-to-log correlation:
         ```dql
         fetch logs
         | filter service.name == "{service_name}"
         | filter isNotNull(trace_id)
         | summarize correlated=count()
         ```
         Compare correlated count vs total logs to get correlation percentage.

      2. Verify cross-service propagation:
         Check for traces spanning multiple services as defined in boundary_types.

      ### Phase 7: Generate Validation Report

      Produce a dual-format report:

      **Human-readable report** at `_bmad-output/o11y-artifacts/reports/{service}-validation-{date}.md`:

      ```markdown
      # Observability Validation Report
      ## Service: {service_name}
      ## Date: {date}
      ## Overall Status: {PASS|PARTIAL|FAIL}

      ### Summary
      - Trace contracts: {X}/{Y} passed
      - Log contracts: {X}/{Y} passed
      - Metric contracts: {X}/{Y} passed
      - Correlation contracts: {X}/{Y} passed

      ### Failures
      | Contract | Expected | Actual | Severity |
      |----------|----------|--------|----------|
      | ... | ... | ... | CRITICAL/HIGH/MEDIUM |

      ### Recommendations
      1. [CRITICAL] Missing span: POST /api/register
         - Fix: Add span instrumentation in registration handler
         - Spec reference: trace_contracts.spans[0]
      ```

      **Machine-readable report** at `_bmad-output/o11y-artifacts/reports/{service}-validation-{date}.yaml`

      ### Phase 8: Generate Fix Stories

      For each FAIL result:
      1. Create a fix story in BMAD standard format
      2. Include `spec_reference` pointing to the failed contract
      3. Include `test_criteria` with the DQL query that should pass after fix
      4. Include language-specific fix suggestions
      5. Append stories to the companion epic

      ## Important Notes

      - NEVER skip the Query Validation Gate
      - A FAIL means the spec says it should exist but it doesn't -- not that the query is wrong
      - Always suggest troubleshooting DQL queries alongside fix recommendations
      - Rate failures by severity: CRITICAL (SLO-impacting), HIGH (spec violation), MEDIUM (best practice)
      - Attribute ownership matters: don't fail app_managed attributes for collector_managed issues

  - id: define-slos
    content: |
      Define SLOs from the observability spec and generate a test-consumable SLO
      contract with performance, reliability, and availability KPIs.

      ## Overview

      This workflow translates observability specs and user requirements into
      concrete SLO definitions. The output is an SLO contract that:
      - Defines measurable KPIs (Performance, Reliability, Availability)
      - Maps each KPI to a test type (load, soak, chaos, synthetic)
      - Provides ready-to-use test assertions
      - Requires explicit user approval before generating test stories

      ## Workflow

      ### Step 1: Load Observability Spec

      Read the spec from `observability-specs/{service}-spec.yaml`
      Extract:
      - Use cases with SLO boundaries
      - Metric contracts (for latency, error rate, throughput)
      - Trace contracts (for end-to-end latency)

      ### Step 2: Define Performance KPIs

      For each latency-sensitive use case:

      ```yaml
      performance_kpis:
        - id: perf-001
          name: "Registration Latency"
          description: "End-to-end registration request latency"
          signal: traces
          measurement:
            dql: |
              fetch spans
              | filter service.name == "registration-service"
              | filter span.name == "POST /api/register"
              | filter span.kind == "SERVER"
              | summarize p95=percentile(duration, 95)/1000000
            metric: "http.server.request.duration"
          target:
            p50: 200  # ms
            p95: 500  # ms
            p99: 1000 # ms
          test_type: load_test
          test_assertion: "p95_latency_ms < 500"
          use_case_ref: "uc-001"
      ```

      ### Step 3: Define Reliability KPIs

      For each error-sensitive use case:

      ```yaml
      reliability_kpis:
        - id: rel-001
          name: "Registration Success Rate"
          description: "Percentage of registrations completing without error"
          signal: metrics
          measurement:
            dql: |
              timeseries {
                success=sum(registration.success.total),
                errors=sum(registration.error.total)
              }, interval:5m
              | fieldsAdd success_rate=(success[]/(success[]+errors[]))*100
            metric: "registration.success.total / (registration.success.total + registration.error.total)"
          target:
            success_rate: 99.9  # percentage
            error_budget_monthly: 0.1  # percentage
          test_type: soak_test
          test_assertion: "success_rate > 99.9"
          use_case_ref: "uc-002"
      ```

      ### Step 4: Define Availability KPIs

      ```yaml
      availability_kpis:
        - id: avail-001
          name: "Registration Service Uptime"
          description: "Service availability measured by successful health checks"
          signal: synthetic
          measurement:
            method: "HTTP health check every 60s"
            endpoint: "/health"
          target:
            uptime: 99.95  # percentage
            max_downtime_monthly: "21m 54s"
            recovery_time: 300  # seconds (5 minutes)
          test_type: chaos_test
          test_assertion: "uptime_percentage > 99.95"
      ```

      ### Step 5: Present for User Approval

      Display the SLO summary table:

      ```
      ┌──────────┬─────────────────────────┬──────────┬────────────────────┐
      │ KPI ID   │ Name                    │ Target   │ Test Type          │
      ├──────────┼─────────────────────────┼──────────┼────────────────────┤
      │ perf-001 │ Registration Latency    │ p95<500ms│ load_test          │
      │ rel-001  │ Registration Success    │ 99.9%    │ soak_test          │
      │ avail-001│ Service Uptime          │ 99.95%   │ chaos_test         │
      └──────────┴─────────────────────────┴──────────┴────────────────────┘

      Do you approve these SLO targets? (y/n/modify)
      ```

      **CRITICAL:** SLOs MUST be explicitly approved before generating test stories.

      ### Step 6: Generate SLO Contract

      Save to `observability-specs/slo-contract.yaml`:

      ```yaml
      metadata:
        service: "registration-service"
        version: "1.0"
        created_by: "o11y-engineer"
        approved: true  # MUST be true before test stories
        approved_by: "{user}"
        approved_at: "{timestamp}"

      performance_kpis:
        - {as defined above}

      reliability_kpis:
        - {as defined above}

      availability_kpis:
        - {as defined above}
      ```

      ### Step 7: Generate Test Stories (Only if Approved)

      If `approved: true`, generate test stories for the Test Architect (Murat):

      For each KPI, create a story:
      ```yaml
      story:
        title: "Validate {kpi_name} SLO"
        type: "{test_type}"
        acceptance_criteria:
          - "Test asserts: {test_assertion}"
          - "Test runs against: {measurement.dql}"
          - "SLO target: {target}"
        spec_reference: "slo-contract.yaml#{kpi_id}"
        test_criteria:
          assertion: "{test_assertion}"
          dql_query: "{measurement.dql}"
      ```

      Stories go to `_bmad-output/epics/` using BMAD standard format.

      ### Step 8: Configure Dynatrace SLOs (Optional)

      If user wants Dynatrace SLO monitoring:
      ```yaml
      # dtctl SLO definition
      type: slo
      name: "{kpi_name}"
      target: {target_value}
      warning: {warning_value}
      evaluationType: AGGREGATE
      metricExpression: "{metric_expression}"
      evaluationWindow: "-1w"
      ```

      ## Important Notes

      - SLOs must be **approved** before test stories are generated
      - Each SLO maps to exactly one **test type** for the Test Architect
      - The **test_assertion** field is machine-readable for test frameworks
      - SLO contract is the **handoff artifact** to the Test Architect (Murat)
      - Unapproved SLOs are draft proposals only -- they MUST NOT generate test stories

