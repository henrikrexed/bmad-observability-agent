prompts:
  # NOTE: This file contains Parts 1-5
  # Parts 6-7 will be appended by the setup scripts
  # 
  # Content included:
  # - Part 1: Metadata and persona (above)
  # - Part 2: Menu (above)
  # - Part 3: Core observability prompts (intent-detection, quality-check, issue-remediation, best-practices)
  # - Part 4: Collector and instrumentation prompts
  # - Part 5: Weaver and semantic convention prompts
  #
  # After pasting this file, run:
  # - ./create_agent_part6.sh (adds OCB prompts)
  # - ./create_agent_part7.sh (adds Dynatrace prompts)
  
  # ═══════════════════════════════════════════════════════
  # BMAD COLLABORATION PROMPTS
  # ═══════════════════════════════════════════════════════

  - id: bmad-handoff-generation
    content: |
      Generate a structured handoff summary for other BMAD agents to understand current observability status.

      ## Handoff Document Structure

      Always generate handoffs in this YAML format for machine parsing:

      ```yaml
      # BMAD Agent Handoff - Observability Status
      # Generated by: O11y Engineer Agent
      # Timestamp: {ISO 8601 timestamp}

      handoff:
        agent: "o11y-engineer"
        version: "1.0.0"
        session_id: "{unique session identifier}"
        timestamp: "{ISO 8601}"

      ## Current State Summary
      observability_status:
        overall_score: {0-100}
        grade: "{A/B/C/D/F}"
        production_ready: {true/false}

        signals:
          traces:
            enabled: {true/false}
            coverage: "{percentage}%"
            status: "{healthy/degraded/missing}"
          metrics:
            enabled: {true/false}
            coverage: "{percentage}%"
            status: "{healthy/degraded/missing}"
          logs:
            enabled: {true/false}
            coverage: "{percentage}%"
            status: "{healthy/degraded/missing}"
          profiling:
            enabled: {true/false}
            status: "{healthy/degraded/missing}"

        collector:
          deployed: {true/false}
          replicas: {number}
          ha_enabled: {true/false}
          memory_limiter: {true/false}
          sampling_configured: {true/false}

        instrumentation:
          method: "{manual/auto-k8s-operator/auto-ebpf}"
          languages_covered: ["{list}"]
          score: {0-100}

        semantic_conventions:
          compliance: "{percentage}%"
          custom_conventions: {true/false}
          weaver_managed: {true/false}

        dynatrace:
          integrated: {true/false}
          dtctl_configured: {true/false}
          dashboards_created: {number}

      ## Actions Completed This Session
      completed_actions:
        - action: "{action name}"
          timestamp: "{ISO 8601}"
          result: "{success/partial/failed}"
          details: "{description}"
          artifacts:
            - type: "{file/config/dashboard}"
              path: "{path or identifier}"

      ## Pending Tasks
      pending_tasks:
        - task: "{task description}"
          priority: "{critical/high/medium/low}"
          blocked_by: "{dependency or null}"
          estimated_effort: "{time estimate}"

      ## Recommendations for Next Agent
      recommendations:
        immediate:
          - "{action to take immediately}"
        short_term:
          - "{action for this sprint/week}"
        long_term:
          - "{strategic improvement}"

      ## Context for Other Agents
      context:
        project_type: "{microservices/monolith/hybrid}"
        deployment_target: "{kubernetes/docker/vm/serverless}"
        backend_vendor: "{dynatrace/datadog/grafana/etc}"
        team_expertise: "{beginner/intermediate/advanced}"
        constraints:
          - "{any constraints or limitations}"

      ## Files Modified
      files_modified:
        - path: "{file path}"
          action: "{created/modified/deleted}"
          purpose: "{why it was changed}"

      ## Validation Results
      validation:
        yaml_valid: {true/false}
        prompts_count: {number}
        workflows_count: {number}
        quality_score: {0-100}
        issues_found: ["{list of issues}"]
      ```

      ## When to Generate Handoffs

      Generate a handoff document:
      1. After completing any workflow
      2. After making significant configuration changes
      3. When quality score changes significantly
      4. When user requests status
      5. Before ending a session
      6. When transitioning to another agent

      ## Example Handoff

      ```yaml
      handoff:
        agent: "o11y-engineer"
        version: "1.0.0"
        session_id: "sess_2024011701"
        timestamp: "2024-01-17T10:30:00Z"

      observability_status:
        overall_score: 78
        grade: "C"
        production_ready: false

        signals:
          traces:
            enabled: true
            coverage: "85%"
            status: "healthy"
          metrics:
            enabled: true
            coverage: "70%"
            status: "degraded"
          logs:
            enabled: true
            coverage: "60%"
            status: "healthy"
          profiling:
            enabled: false
            status: "missing"

        collector:
          deployed: true
          replicas: 1
          ha_enabled: false
          memory_limiter: false
          sampling_configured: false

      completed_actions:
        - action: "Configured OTel Collector pipeline"
          timestamp: "2024-01-17T10:15:00Z"
          result: "success"
          details: "Added OTLP receiver, batch processor, OTLP exporter"
          artifacts:
            - type: "config"
              path: "otel-collector-config.yaml"

        - action: "Ran quality assessment"
          timestamp: "2024-01-17T10:25:00Z"
          result: "success"
          details: "Score: 78/100, Grade C"

      pending_tasks:
        - task: "Add memory_limiter processor"
          priority: "critical"
          blocked_by: null
          estimated_effort: "30 minutes"
        - task: "Scale collector to 3 replicas"
          priority: "high"
          blocked_by: null
          estimated_effort: "15 minutes"
        - task: "Enable continuous profiling"
          priority: "medium"
          blocked_by: null
          estimated_effort: "2 hours"

      recommendations:
        immediate:
          - "Add memory_limiter to prevent OOM crashes"
          - "Scale collector to 3 replicas for HA"
        short_term:
          - "Implement tail-based sampling"
          - "Enable profiling"
        long_term:
          - "Define SLOs for all services"
          - "Create runbooks for alerts"

      context:
        project_type: "microservices"
        deployment_target: "kubernetes"
        backend_vendor: "dynatrace"
        team_expertise: "intermediate"
      ```

