  - id: pipeline-diagnostics
    content: |
      Diagnose OpenTelemetry Collector pipeline issues and data flow problems.

      ## Diagnostic Commands
      ```bash
      # 1. Check collector health
      curl http://collector:13133/

      # 2. Check internal metrics
      curl http://collector:8888/metrics | grep otelcol

      # 3. Check zpages (if enabled)
      curl http://collector:55679/debug/tracez

      # 4. Check logs for errors
      kubectl logs -l app=otelcol | grep -i "error\|warn\|drop"

      # 5. Check receiver status
      curl http://collector:8888/metrics | grep receiver

      # 6. Check exporter status
      curl http://collector:8888/metrics | grep exporter
      ```

      ## Common Issues and Fixes

      ### No Data Flowing
      - Verify receiver endpoint configuration
      - Check network connectivity (ports, network policies)
      - Verify pipeline configuration (receiver → processor → exporter)
      - Check authentication/authorization

      ### High Memory Usage / OOM
      - Add memory_limiter processor as FIRST processor
      - Reduce batch size
      - Enable backpressure
      - Increase pod memory limits

      ### Dropped Spans/Metrics
      - Increase queue_size in exporter
      - Enable retry_on_failure
      - Scale up collector replicas
      - Check backend availability

      ### Slow Pipeline / High Latency
      - Enable batching
      - Check exporter connectivity
      - Profile with pprof extension
      - Reduce processing complexity

      ## Debug Configuration
      ```yaml
      service:
        telemetry:
          logs:
            level: debug
          metrics:
            level: detailed
        extensions: [health_check, pprof, zpages]

      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
        pprof:
          endpoint: 0.0.0.0:1777
        zpages:
          endpoint: 0.0.0.0:55679
      ```

      Run diagnostics and identify pipeline issues.

  - id: cardinality-optimization
    content: |
      Analyze and optimize metric cardinality to prevent cost explosion and performance issues.

      ## Cardinality Analysis
      ```bash
      # Target thresholds:
      # - Total unique series: <100,000
      # - Per-metric series: <10,000
      # - Labels per metric: <10
      ```

      ## Common High-Cardinality Culprits
      | Attribute | Issue | Fix |
      |-----------|-------|-----|
      | user_id | Unbounded | Remove or hash |
      | customer_id | Unbounded | Remove or aggregate |
      | trace_id | Unbounded | Never use in metrics |
      | request_id | Unbounded | Never use in metrics |
      | http.target | High cardinality | Use http.route instead |
      | error.message | Unbounded | Use error.type instead |
      | timestamp | Infinite | Never use as label |

      ## Optimization Strategies

      ### 1. Drop High-Cardinality Attributes
      ```yaml
      processors:
        filter/drop-high-cardinality:
          metrics:
            datapoint:
              - 'HasAttrKey(attributes, "user.id")'
              - 'HasAttrKey(attributes, "trace.id")'
              - 'HasAttrKey(attributes, "request.id")'
      ```

      ### 2. Transform to Bounded Values
      ```yaml
      processors:
        transform/aggregate:
          metric_statements:
            - context: datapoint
              statements:
                # Remove user_id, add user_type
                - delete_key(attributes, "user.id")
                - set(attributes["user.type"], "authenticated") where attributes["user.id"] != nil

                # Replace full URL with route template
                - replace_pattern(attributes["http.target"], "/users/[0-9]+", "/users/{id}")
      ```

      ### 3. Use Bounded Labels
      - http.route instead of http.target
      - error.type instead of error.message
      - status_code groups (2xx, 4xx, 5xx)
      - service.name (bounded set)

      ## Monitoring Cardinality
      ```yaml
      # Alert when cardinality exceeds threshold
      - alert: HighMetricCardinality
        expr: count(count by(__name__)({__name__=~".+"})) > 100000
        for: 5m
        labels:
          severity: warning
      ```

      Analyze and optimize your metric cardinality.

  - id: vendor-compatibility
    content: |
      Check configuration compatibility with observability vendors.

      ## Vendor Configurations

      ### Dynatrace
      ```yaml
      exporters:
        otlphttp:
          endpoint: "https://{environment-id}.live.dynatrace.com/api/v2/otlp"
          headers:
            Authorization: "Api-Token ${DT_API_TOKEN}"
      ```
      - Supported: traces, metrics, logs
      - Required attributes: service.name, service.version

      ### Datadog
      ```yaml
      exporters:
        datadog:
          api:
            key: "${DD_API_KEY}"
            site: datadoghq.com  # or datadoghq.eu
      ```
      - Supported: traces, metrics, logs
      - Requires Datadog exporter

      ### Grafana Cloud
      ```yaml
      exporters:
        otlphttp:
          endpoint: "https://otlp-gateway-{region}.grafana.net/otlp"
          headers:
            Authorization: "Basic ${GRAFANA_AUTH}"
      ```
      - Supported: traces, metrics, logs
      - Uses basic auth (instance_id:token)

      ### New Relic
      ```yaml
      exporters:
        otlp:
          endpoint: "https://otlp.nr-data.net:4317"
          headers:
            api-key: "${NEW_RELIC_LICENSE_KEY}"
      ```
      - Supported: traces, metrics, logs

      ### AWS (X-Ray, CloudWatch)
      ```yaml
      exporters:
        awsxray:
          region: us-east-1
        awsemf:
          region: us-east-1
          namespace: MyApplication
      ```

      ## Common Compatibility Issues
      - Missing required resource attributes
      - Incorrect authentication headers
      - OTLP protocol mismatch (gRPC vs HTTP)
      - Attribute naming conflicts
      - Rate limiting / quota issues

      Check vendor compatibility for your configuration.

  - id: export-configuration
    content: |
      Export complete observability configuration as Infrastructure as Code.

      ## Export Collector Configuration
      ```bash
      # Export from Kubernetes
      kubectl get configmap otelcol-config -o yaml > collector-config.yaml

      # Export deployment
      kubectl get deployment otelcol -o yaml > otelcol-deployment.yaml

      # Export service
      kubectl get service otelcol -o yaml > otelcol-service.yaml
      ```

      ## Export K8s Resources
      ```bash
      # Instrumentation resources
      kubectl get instrumentation -A -o yaml > instrumentation.yaml

      # Service accounts and RBAC
      kubectl get sa,role,rolebinding -l app=otelcol -o yaml > rbac.yaml

      # Secrets (names only, not values)
      kubectl get secrets -l app=otelcol --show-labels
      ```

      ## Export Dynatrace Config (dtctl)
      ```bash
      # List all dashboards
      dtctl get dashboards -o yaml > dashboards-backup.yaml

      # Get specific dashboard
      dtctl get dashboard "my-dashboard" -o yaml > my-dashboard.yaml

      # List all workflows
      dtctl get workflows -o yaml > workflows-backup.yaml

      # Get SLOs
      dtctl get slos -o yaml > slos-backup.yaml
      ```

      ## Generate Helm Values
      ```yaml
      # values.yaml for otel-collector chart
      mode: deployment
      replicaCount: 3

      image:
        repository: otel/opentelemetry-collector-contrib
        tag: "0.93.0"

      config:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318

        processors:
          memory_limiter:
            check_interval: 1s
            limit_mib: 512
            spike_limit_mib: 128
          batch:
            timeout: 10s
            send_batch_size: 8192

        exporters:
          otlp:
            endpoint: "backend:4317"
            tls:
              insecure: false

        service:
          pipelines:
            traces:
              receivers: [otlp]
              processors: [memory_limiter, batch]
              exporters: [otlp]
      ```

      Export your observability configuration as code.

  - id: config-comparison
    content: |
      Compare current vs. target observability configuration.

      ## Comparison Framework

      ### 1. Signal Coverage Comparison
      | Signal | Current | Target | Gap |
      |--------|---------|--------|-----|
      | Traces | 80% services | 100% | -20% |
      | Metrics (RED) | 70% services | 100% | -30% |
      | Logs (structured) | 50% services | 100% | -50% |
      | Profiling | 0% | 100% critical | -100% |

      ### 2. Collector Configuration Comparison
      | Setting | Current | Best Practice | Action |
      |---------|---------|---------------|--------|
      | memory_limiter | ❌ | ✅ Required | ADD |
      | batch | ✅ | ✅ | OK |
      | Replicas | 1 | 3+ | SCALE |
      | sampling | None | Tail-based | CONFIGURE |

      ### 3. Instrumentation Comparison
      | Aspect | Current | Target | Priority |
      |--------|---------|--------|----------|
      | Method | Manual | K8s Operator | HIGH |
      | Sampling | 100% | Tail-based 10% | CRITICAL |
      | Exemplars | ❌ | ✅ | MEDIUM |
      | Trace context in logs | ❌ | ✅ | HIGH |

      ## Diff Generation
      ```diff
      # Collector configuration diff

      - replicas: 1
      + replicas: 3

      processors:
      -   batch: {}
      +   memory_limiter:
      +     check_interval: 1s
      +     limit_mib: 512
      +   batch:
      +     timeout: 10s

      + tail_sampling:
      +   policies:
      +     - name: errors
      +       type: status_code
      +       status_code: {status_codes: [ERROR]}
      +     - name: slow
      +       type: latency
      +       latency: {threshold_ms: 500}
      +     - name: normal
      +       type: probabilistic
      +       probabilistic: {sampling_percentage: 10}
      ```

      ## Migration Plan
      1. **Week 1 (Critical):** Add memory_limiter, scale to 3 replicas
      2. **Week 2 (High):** Enable tail-based sampling
      3. **Week 3 (Medium):** Add exemplars, trace context in logs
      4. **Week 4 (Low):** Enable profiling

      Compare configurations and generate migration plan.


