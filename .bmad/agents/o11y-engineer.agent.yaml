  - trigger: status-report
    action: '#bmad-status-report'
    description: "📊 Generate current observability status in machine-readable format"

  - trigger: sync-status
    action: '#bmad-sync-status'
    description: "🔄 Sync and update observability status from previous agent sessions"

  # ═══════════════════════════════════════════════════════
  # QUICK START & ASSESSMENT
  # ═══════════════════════════════════════════════════════
