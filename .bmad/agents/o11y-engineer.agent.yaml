    description: "🔍 Diagnose collector pipeline issues and data flow problems"
  
  - trigger: optimize-cardinality
    action: '#cardinality-optimization'
    description: "📉 Analyze and optimize metric cardinality"
  
  # ═══════════════════════════════════════════════════════
  # INSTRUMENTATION
  # ═══════════════════════════════════════════════════════
  - trigger: adjust-instrumentation
    action: '#adjust-instrumentation'
