  - id: mcp-discover-services
    content: |
      Discover services and entities in the Dynatrace environment using MCP.

      ## Prerequisites
      This feature requires the Dynatrace MCP server to be configured.
      See installation docs for setup instructions.

      ## Discovery Process

      **Step 1: Check MCP Availability**
      If Dynatrace MCP tools are available, use them directly.
      If not, inform the user to configure the MCP server or use dtctl manually.

      **Step 2: Discover Services**
      Use the Dynatrace MCP execute_dql tool:
      ```dql
      fetch dt.entity.service
      | fields entity.name, entity.type, tags
      | sort entity.name
      | limit 100
      ```

      **Step 3: Discover Hosts**
      ```dql
      fetch dt.entity.host
      | fields entity.name, osType, hypervisorType
      | sort entity.name
      | limit 50
      ```

      **Step 4: Discover Kubernetes Entities**
      ```dql
      fetch dt.entity.cloud_application_namespace
      | fields entity.name, clustered_by[dt.entity.kubernetes_cluster]
      | limit 50
      ```

      **Step 5: Discover Process Groups**
      ```dql
      fetch dt.entity.process_group
      | fields entity.name, technology, runs_on[dt.entity.host]
      | limit 50
      ```

      ## Output Format
      Present discovered entities in a structured format:
      ```
      ## Services (X found)
      | Name | Type | Tags |
      |------|------|------|
      | ... | ... | ... |

      ## Hosts (X found)
      | Name | OS | Hypervisor |
      |------|-----|------------|
      | ... | ... | ... |
      ```

      Provide recommendations for dashboards, notebooks, or workflows based on discovered entities.

  - id: mcp-discover-metrics
    content: |
      Discover available metrics for services using Dynatrace MCP.

      ## Prerequisites
      Requires Dynatrace MCP server to be configured.

      ## Discovery Process

      **Step 1: List Available Metric Keys**
      ```dql
      fetch dt.metrics
      | filter contains(metric.key, "builtin:service")
      | summarize count = count(), by: {metric.key}
      | sort count desc
      | limit 50
      ```

      **Step 2: Service-Specific Metrics**
      For a specific service:
      ```dql
      fetch dt.metrics
      | filter dt.entity.service == "SERVICE_NAME"
      | summarize count = count(), by: {metric.key}
      | sort count desc
      | limit 30
      ```

      **Step 3: Custom Metrics**
      ```dql
      fetch dt.metrics
      | filter not(startsWith(metric.key, "builtin:"))
      | summarize count = count(), by: {metric.key}
      | sort count desc
      | limit 30
      ```

      ## Common Metric Categories

      ### RED Metrics (Rate, Errors, Duration)
      - `builtin:service.response.time` - Response time
      - `builtin:service.errors.total.rate` - Error rate
      - `builtin:service.requestCount.total` - Throughput

      ### Resource Metrics
      - `builtin:host.cpu.usage` - CPU utilization
      - `builtin:host.mem.usage` - Memory utilization
      - `builtin:containers.cpu.usagePercent` - Container CPU

      ### Custom Business Metrics
      Look for metrics prefixed with your application name.

      ## Output Format
      Present metrics grouped by category with:
      - Metric key
      - Description
      - Suggested visualization type (graph, single value, heatmap)

      Recommend which metrics to include in dashboards.

  - id: mcp-analyze-logs
    content: |
      Analyze log patterns and attributes using Dynatrace MCP.

      ## Prerequisites
      Requires Dynatrace MCP server with log read permissions.

      ## Analysis Process

      **Step 1: Discover Log Sources**
      ```dql
      fetch logs
      | summarize count = count(), by: {log.source}
      | sort count desc
      | limit 20
      ```

      **Step 2: Analyze Log Attributes**
      For a specific service:
      ```dql
      fetch logs
      | filter dt.entity.service == "SERVICE_NAME"
      | limit 1
      | fields *
      ```
      This reveals all available attributes for log filtering.

      **Step 3: Error Pattern Analysis**
      ```dql
      fetch logs
      | filter severity == "ERROR"
      | summarize count = count(), by: {content}
      | sort count desc
      | limit 20
      ```

      **Step 4: Log Volume Analysis**
      ```dql
      fetch logs
      | summarize count = count(), by: {bin(timestamp, 1h)}
      | sort timestamp asc
      ```

      **Step 5: Trace Correlation**
      ```dql
      fetch logs
      | filter isNotNull(trace_id)
      | summarize count = count(), by: {dt.entity.service}
      | sort count desc
      ```

      ## Output Format
      Provide:
      1. Summary of log sources and volumes
      2. Common error patterns
      3. Available attributes for filtering
      4. Recommendations for log-based alerts
      5. Suggested DQL queries for diagnostic notebooks

      ## Sample Diagnostic Queries
      Generate ready-to-use DQL queries for common investigations:
      - Error spike analysis
      - Latency correlation with logs
      - Security event detection
      - Deployment impact analysis

