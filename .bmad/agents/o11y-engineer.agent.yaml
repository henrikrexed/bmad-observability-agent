              "height": 304
            },
            "queries": [
              {
                "id": "A",
                "metric": "builtin:service.response.time",
                "spaceAggregation": "PERCENTILE",
                "percentile": 95,
                "timeAggregation": "DEFAULT",
                "splitBy": ["dt.entity.service"]
              }
            ]
          }
        ]
      }
```
      
      ### Template 2: Kubernetes Dashboard
```json
      {
        "dashboardMetadata": {
          "name": "Kubernetes Cluster Overview",
          "shared": true
        },
        "tiles": [
          {
            "name": "Cluster Health",
            "tileType": "DATA_EXPLORER",
            "queries": [
              {
                "id": "A",
                "metric": "builtin:kubernetes.cluster.memory.available",
                "splitBy": ["dt.entity.kubernetes_cluster"]
              }
            ]
          },
          {
            "name": "Pod Status",
            "tileType": "DATA_EXPLORER",
            "queries": [
              {
                "id": "A",
                "metric": "builtin:kubernetes.pods",
                "splitBy": ["phase"]
              }
            ]
          },
          {
            "name": "Node CPU",
            "tileType": "DATA_EXPLORER",
            "queries": [
              {
                "id": "A",
                "metric": "builtin:kubernetes.node.cpu.usage",
                "splitBy": ["dt.entity.kubernetes_node"]
              }
            ]
          }
        ]
      }
```
      
      ## dtctl Dashboard YAML
```yaml
      # dashboards/red-metrics.yaml
      apiVersion: platform.dynatrace.com/v1
      kind: Dashboard
      metadata:
        name: red-metrics-payment-service
      spec:
        dashboardMetadata:
          name: "RED Metrics - Payment Service"
          shared: true
          owner: "platform-team"
        tiles:
          # Add tiles from JSON template above
```

      ## Deploy Dashboard
```bash
      # Deploy to development context
      dtctl apply -f dashboards/red-metrics.yaml --context development

      # Deploy to all environments
      for ctx in development staging production; do
        dtctl apply -f dashboards/ --context $ctx
      done

      # Get deployed dashboard
      dtctl get dashboard "red-metrics-payment-service" -o yaml

      # Edit dashboard interactively
      dtctl edit dashboard "red-metrics-payment-service"
```

      Generate dashboard JSON and dtctl configuration.

  - id: dtctl-create-notebook
    content: |
      Create Dynatrace notebook for analysis and documentation.
      
      Notebook templates:
      1. Incident Analysis - Root cause investigation
      2. Performance Investigation - Deep dive into latency
      3. Security Analysis - Security event correlation
      4. Capacity Planning - Resource trend analysis
      
      Sections include:
      - Markdown documentation
      - Data Explorer queries
      - Log queries
      - Distributed traces
      - Code blocks (DQL)
      - User input parameters
      
      Generate notebook JSON with interactive sections.

  - id: dtctl-run-query
    content: |
      Execute DQL (Dynatrace Query Language) queries for advanced observability.
      
      ## DQL Query Examples
      
      ### Query Logs
```dql
      fetch logs
      | filter status == "ERROR"
      | filter timestamp >= now() - 1h
      | summarize count(), by: {service.name}
      | sort count desc
      | limit 10
```
      
      ### Query Metrics
```dql
      fetch dt.metrics
      | filter metric.key == "builtin:service.response.time"
      | filter dt.entity.service == "SERVICE-123"
      | summarize avg(metric.value), by: {1h}
```
      
      ### Query Spans
```dql
      fetch spans
      | filter span.name == "POST /api/checkout"
      | filter duration > 1s
      | summarize p95 = percentile(duration, 95), by: {span.name}
```
      
      ### Complex Join Query
```dql
      fetch logs
      | filter status == "ERROR"
      | join [
          fetch spans
          | filter span.kind == "SERVER"
        ], on: trace.id == trace_id
      | summarize error_count = count(), by: {service.name, span.name}
```
      
      Execute query via API and format results.

  - id: dtctl-configure-alerting
    content: |
      Configure Dynatrace alerting, SLOs, and problem notifications.
      
      ## Components
      
      1. Management Zones - Organize monitoring scope
      2. Alerting Profiles - Route alerts to teams
      3. Custom Metric Events - Define alert conditions
      4. SLO Configuration - Service level objectives
      5. Problem Notifications - Slack, PagerDuty, email
      
      ## SLO Example
```json
      {
        "name": "Payment Service Availability",
        "enabled": true,
        "target": 99.9,
        "warning": 99.95,
        "errorBudgetBurnRate": {
          "fastBurnThreshold": 10
        },
        "evaluationType": "AGGREGATE",
        "filter": "type(SERVICE),tag(\"app:payment\")",
        "metricExpression": "(builtin:service.errors.total.count:splitBy())/(builtin:service.request.count:splitBy())*100",
        "evaluationWindow": "-1w"
      }
```
      
      Generate complete alerting and SLO configuration.

  - id: dtctl-export-config
    content: |
      Export Dynatrace configuration as code using dtctl.

      Export all configuration types:
      - Dashboards
      - Notebooks
      - Alerting profiles
      - Management zones
      - SLOs
      - Synthetic monitors
      - Workflows
      - Auto-tags
```bash
      # Export all dashboards
      dtctl get dashboards -o yaml > backup-$(date +%Y%m%d)/dashboards.yaml

      # Export all workflows
      dtctl get workflows -o yaml > backup-$(date +%Y%m%d)/workflows.yaml

      # Export all SLOs
      dtctl get slos -o yaml > backup-$(date +%Y%m%d)/slos.yaml

      # Export specific dashboard by name
      dtctl get dashboard "my-dashboard" -o yaml > dashboards/my-dashboard.yaml

      # Describe a workflow in detail
      dtctl describe workflow "auto-remediation"

      # Export settings objects
      dtctl get settings-objects --schema "builtin:alerting.profile" -o yaml
```

      Generate backup and version control workflow.

  - id: dtctl-validate-config
    content: |
      Validate Dynatrace configuration before deployment.

      Validation steps:
      1. dtctl dry-run deployment
      2. YAML schema validation
      3. Lint for common issues (hardcoded values, deprecated APIs)
      4. Pre-deployment checks (connectivity, token permissions)
      5. CI/CD validation pipeline
```bash
      # Dry-run to validate without applying
      dtctl apply -f dashboard.yaml --dry-run

      # Validate all files in directory
      dtctl apply -f dashboards/ --dry-run

      # Test DQL queries before deployment
      dtctl query "fetch logs | limit 1" --dry-run

      # Check for issues:
      # - Hardcoded environment URLs
      # - Missing required fields
      # - Deprecated metric keys
      # - Invalid DQL syntax

      # Verify current context
      dtctl config current-context

      # Test token permissions
      dtctl get workflows  # Should succeed if token has read access
```

      Generate validation report with actionable fixes.

  - id: dtctl-synthetic-monitoring
    content: |
      Configure Dynatrace synthetic monitors for proactive monitoring.
      
      Monitor types:
      
      1. HTTP Monitors - API health checks
      2. Browser Monitors - Multi-step user journeys
      3. Location Selection - Global monitoring points
      
      ## HTTP Monitor Example
```json
      {
        "name": "API Health Check",
        "enabled": true,
        "type": "HTTP",
        "script": {
          "version": "1.0",
          "requests": [
            {
              "description": "Check API endpoint",
              "url": "https://api.example.com/health",
              "method": "GET",
              "validation": {
                "rules": [
                  {
                    "type": "httpStatusesList",
                    "acceptedValues": [200],
                    "passIfFound": true
                  }
                ]
              }
            }
          ]
        },
        "locations": ["GEOLOCATION-1", "GEOLOCATION-2"],
        "frequency": 5,
        "anomalyDetection": {
          "outageHandling": {
            "globalOutage": true,
            "localOutage": false
          },
          "loadingTimeThresholds": {
            "enabled": true,
            "thresholds": [
              {
                "type": "TOTAL",
                "valueMs": 1000
              }
            ]
          }
        }
      }
```
      
      Generate synthetic monitoring configuration with alerting.

  # ═══════════════════════════════════════════════════════
  # MCP-POWERED DISCOVERY & ANALYSIS PROMPTS
