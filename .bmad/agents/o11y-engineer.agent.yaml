  - id: bmad-status-report
    content: |
      Generate current observability status in a machine-readable format for other BMAD agents.

      ## Status Report Format

      ```yaml
      # BMAD Observability Status Report
      # Format Version: 1.0

      status_report:
        generated_at: "{ISO 8601 timestamp}"
        generated_by: "o11y-engineer"
        report_type: "observability_status"

      ## Quick Summary (for display)
      summary:
        headline: "{One-line status}"
        score: {0-100}
        grade: "{A/B/C/D/F}"
        trend: "{improving/stable/degrading}"
        production_ready: {true/false}
        critical_issues: {count}
        warnings: {count}

      ## Detailed Scores
      scores:
        signal_coverage: {0-100}
        signal_correlation: {0-100}
        semantic_conventions: {0-100}
        cardinality_management: {0-100}
        production_readiness: {0-100}
        operational_maturity: {0-100}

      ## Component Status
      components:
        collector:
          status: "{healthy/degraded/down/not_deployed}"
          version: "{version}"
          replicas: {current}/{desired}
          last_restart: "{timestamp or null}"
          errors_24h: {count}

        instrumentation:
          method: "{manual/auto}"
          coverage: "{percentage}%"
          services_instrumented: {count}/{total}
          languages: ["{list}"]

        backends:
          - name: "{backend name}"
            status: "{connected/disconnected/error}"
            latency_ms: {avg latency}
            error_rate: "{percentage}%"

      ## Active Issues
      issues:
        critical:
          - id: "{issue id}"
            description: "{description}"
            detected_at: "{timestamp}"
            impact: "{impact description}"
            remediation: "{fix action}"

        warnings:
          - id: "{issue id}"
            description: "{description}"
            recommendation: "{action}"

      ## Recent Changes
      recent_changes:
        - timestamp: "{ISO 8601}"
          change: "{description}"
          impact: "{positive/negative/neutral}"

      ## Metrics Snapshot
      metrics:
        traces_per_minute: {count}
        metrics_series_count: {count}
        logs_per_minute: {count}
        sampling_rate: "{percentage}%"
        error_rate: "{percentage}%"
        p95_latency_ms: {value}

      ## Next Actions
      next_actions:
        - priority: "{critical/high/medium/low}"
          action: "{description}"
          owner: "{agent or team}"
          deadline: "{timestamp or null}"
      ```

      ## Example Status Report

      ```yaml
      status_report:
        generated_at: "2024-01-17T10:30:00Z"
        generated_by: "o11y-engineer"
        report_type: "observability_status"

      summary:
        headline: "Observability at 78% - Not production ready"
        score: 78
        grade: "C"
        trend: "improving"
        production_ready: false
        critical_issues: 2
        warnings: 5

      scores:
        signal_coverage: 85
        signal_correlation: 72
        semantic_conventions: 75
        cardinality_management: 80
        production_readiness: 65
        operational_maturity: 60

      components:
        collector:
          status: "healthy"
          version: "0.93.0"
          replicas: 1/3
          last_restart: null
          errors_24h: 0

        instrumentation:
          method: "auto"
          coverage: "85%"
          services_instrumented: 17/20
          languages: ["java", "python", "nodejs"]

        backends:
          - name: "dynatrace"
            status: "connected"
            latency_ms: 45
            error_rate: "0.1%"

      issues:
        critical:
          - id: "CRIT-001"
            description: "No memory_limiter configured"
            detected_at: "2024-01-17T10:00:00Z"
            impact: "Risk of OOM crashes"
            remediation: "Add memory_limiter as first processor"

          - id: "CRIT-002"
            description: "Single collector replica"
            detected_at: "2024-01-17T10:00:00Z"
            impact: "Single point of failure"
            remediation: "Scale to 3 replicas"

        warnings:
          - id: "WARN-001"
            description: "No SLOs defined"
            recommendation: "Define SLOs for critical services"

      next_actions:
        - priority: "critical"
          action: "Add memory_limiter processor"
          owner: "o11y-engineer"
          deadline: "2024-01-17T12:00:00Z"
      ```

      Generate status reports for cross-agent visibility.

  - id: bmad-sync-status
    content: |
      Sync and update observability status from previous agent sessions.

      ## Status Sync Process

      When starting a new session or receiving a handoff:

      ### 1. Parse Previous Handoff
      ```yaml
      sync_request:
        action: "parse_handoff"
        source: "{file path or inline YAML}"
      ```

      ### 2. Validate Current State
      Compare handoff data with actual current state:
      - Check if collector is still running
      - Verify configuration hasn't changed
      - Validate scores are still accurate
      - Identify any drift

      ### 3. Update Status
      ```yaml
      sync_result:
        handoff_timestamp: "{from handoff}"
        sync_timestamp: "{now}"
        drift_detected: {true/false}

        status_updates:
          - field: "collector.replicas"
            previous: 1
            current: 3
            change: "improved"

          - field: "overall_score"
            previous: 78
            current: 85
            change: "improved"

        new_issues:
          - "{any new issues detected}"

        resolved_issues:
          - "{issues that are now fixed}"

        recommendations:
          - "{updated recommendations based on current state}"
      ```

      ### 4. Continue Work
      Based on sync results:
      - Resume pending tasks from handoff
      - Address any new issues
      - Update epics/stories
      - Generate new handoff when complete

      ## Example Sync Flow

      ```
      1. Receive handoff from previous session
         → Parse YAML structure
         → Extract pending_tasks and recommendations

      2. Validate current state
         → Run *check-quality to get current score
         → Compare with handoff score
         → Identify changes

      3. Report sync results
         → Show what changed since last session
         → Highlight completed vs remaining work
         → Update priorities if needed

      4. Continue implementation
         → Work on highest priority pending task
         → Update status as work progresses
         → Generate new handoff when done
      ```

      Sync status to maintain continuity across agent sessions.

