  - id: auto-instrumentation
    content: |
      Generate auto-instrumentation configuration (zero code changes).
      
      ## Method 1: Kubernetes Operator (Recommended)
      
      ### Step 1: Install Cert Manager (if not already installed)
````bash
      kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml
      
      # Wait for cert-manager to be ready
      kubectl wait --for=condition=Available --timeout=300s \
        deployment/cert-manager -n cert-manager
````
      
      ### Step 2: Install OpenTelemetry Operator
````bash
      kubectl apply -f https://github.com/open-telemetry/opentelemetry-operator/releases/latest/download/opentelemetry-operator.yaml
      
      # Verify installation
      kubectl get deployment -n opentelemetry-operator-system
````
      
      ### Step 3: Create Instrumentation Resource
````yaml
      apiVersion: opentelemetry.io/v1alpha1
      kind: Instrumentation
      metadata:
        name: app-instrumentation
        namespace: default
      spec:
        exporter:
          endpoint: http://otelcol.observability.svc.cluster.local:4317
        
        propagators:
          - tracecontext
          - baggage
        
        sampler:
          type: parentbased_traceidratio
          argument: "0.1"  # 10% sampling
        
        # Java instrumentation
        java:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:latest
          env:
            # Reduce noise in logs
            - name: OTEL_JAVAAGENT_LOGGING
              value: "application"
            # Additional JVM options if needed
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx512m"
        
        # Python instrumentation
        python:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:latest
          env:
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
              value: "true"
        
        # Node.js instrumentation
        nodejs:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:latest
          env:
            - name: OTEL_NODEJS_DEBUG
              value: "false"
        
        # .NET instrumentation
        dotnet:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:latest
          env:
            - name: OTEL_DOTNET_AUTO_LOGS_INCLUDE_FORMATTED_MESSAGE
              value: "true"
````
      
      ### Step 4: Annotate Your Deployment
````yaml
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: payment-service
        namespace: default
      spec:
        replicas: 3
