  - id: weaver-docs-generation
    content: |
      Generate semantic convention documentation from Weaver schema definitions.

      ## Overview

      OpenTelemetry Weaver generates documentation from semantic convention registry definitions,
      ensuring your documentation is always in sync with your schema definitions.

      ## Installation

      ```bash
      # Install Weaver
      cargo install weaver-cli

      # Or via pre-built binaries
      # Download from: https://github.com/open-telemetry/weaver/releases
      ```

      ## Documentation Generation Commands

      ### Generate Markdown Documentation
      ```bash
      # Basic markdown generation
      weaver registry generate \
        --registry=./semconv/registry \
        markdown \
        --output=./docs/semconv/

      # Generate with custom templates
      weaver registry generate \
        --registry=./semconv/registry \
        --templates=./templates/docs/ \
        markdown \
        --output=./docs/

      # Generate HTML documentation
      weaver registry generate \
        --registry=./semconv/registry \
        html \
        --output=./docs/html/
      ```

      ## Output Structure
      ```
      docs/semconv/
      ├── README.md              # Overview and index
      ├── attributes/            # Attribute definitions
      │   ├── http.md           # HTTP semantic conventions
      │   ├── db.md             # Database semantic conventions
      │   ├── messaging.md      # Messaging semantic conventions
      │   ├── rpc.md            # RPC semantic conventions
      │   └── custom/           # Your custom conventions
      │       └── payment.md
      ├── metrics/               # Metric definitions
      │   ├── http.md           # HTTP metrics
      │   ├── db.md             # Database metrics
      │   └── custom/           # Custom metrics
      ├── spans/                 # Span definitions
      │   └── conventions.md    # Span naming conventions
      └── resources/             # Resource semantic conventions
          └── service.md        # Service resource attributes
      ```

      ## Custom Templates

      ### Markdown Template Example
      ```jinja2
      {# attribute-group.md.j2 #}
      # {{ group.id }}

      {{ group.brief }}

      {% if group.note %}
      > **Note:** {{ group.note }}
      {% endif %}

      ## Attributes

      | Attribute | Type | Required | Description |
      |-----------|------|----------|-------------|
      {% for attr in group.attributes %}
      | `{{ attr.id }}` | {{ attr.type }} | {{ attr.requirement_level | default("optional") }} | {{ attr.brief }} |
      {% endfor %}

      {% if group.examples %}
      ## Examples

      {% for example in group.examples %}
      ### {{ example.name }}
      ```{{ example.language }}
      {{ example.code }}
      ```
      {% endfor %}
      {% endif %}

      ## Stability

      {{ group.stability | default("experimental") }}
      ```

      ### HTML Template Example
      ```jinja2
      {# attribute-group.html.j2 #}
      <!DOCTYPE html>
      <html>
      <head>
        <title>{{ group.id }} - Semantic Conventions</title>
        <link rel="stylesheet" href="style.css">
      </head>
      <body>
        <h1>{{ group.id }}</h1>
        <p class="brief">{{ group.brief }}</p>

        <table class="attributes">
          <thead>
            <tr>
              <th>Attribute</th>
              <th>Type</th>
              <th>Required</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
          {% for attr in group.attributes %}
            <tr>
              <td><code>{{ attr.id }}</code></td>
              <td>{{ attr.type }}</td>
              <td>{{ attr.requirement_level }}</td>
              <td>{{ attr.brief }}</td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </body>
      </html>
      ```

      ## CI/CD Integration

      ```yaml
      # .github/workflows/generate-docs.yaml
      name: Generate Semantic Convention Docs

      on:
        push:
          paths:
            - 'semconv/**'

      jobs:
        generate-docs:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4

            - name: Install Weaver
              run: cargo install weaver-cli

            - name: Generate Documentation
              run: |
                weaver registry generate \
                  --registry=./semconv/registry \
                  markdown \
                  --output=./docs/semconv/

            - name: Commit Documentation
              run: |
                git config user.name "github-actions"
                git config user.email "github-actions@github.com"
                git add docs/
                git commit -m "docs: update semantic convention documentation" || exit 0
                git push
      ```

      Generate documentation from your semantic convention registry.

  - id: weaver-code-generation
    content: |
      Generate type-safe instrumentation code from semantic convention schemas.

      ## Overview

      Weaver generates strongly-typed instrumentation code from your semantic convention
      schemas, ensuring consistency and catching errors at compile time.

      ## Supported Languages

      - Go
      - Python
      - TypeScript/JavaScript
      - Java
      - C#/.NET
      - Rust

      ## Code Generation Commands

      ### Generate Go Code
      ```bash
      weaver registry generate \
        --registry=./semconv/registry \
        go \
        --output=./internal/semconv/

      # With custom package name
      weaver registry generate \
        --registry=./semconv/registry \
        go \
        --output=./internal/semconv/ \
        --package=mycompany.semconv
      ```

      ### Generate Python Code
      ```bash
      weaver registry generate \
        --registry=./semconv/registry \
        python \
        --output=./src/semconv/
      ```

      ### Generate TypeScript Code
      ```bash
      weaver registry generate \
        --registry=./semconv/registry \
        typescript \
        --output=./src/semconv/
      ```

      ### Generate Java Code
      ```bash
      weaver registry generate \
        --registry=./semconv/registry \
        java \
        --output=./src/main/java/com/mycompany/semconv/
      ```

      ## Generated Code Examples

      ### Go Usage
      ```go
      package main

      import (
          "go.opentelemetry.io/otel/attribute"
          "myapp/internal/semconv"
      )

      func instrumentPayment(span trace.Span, txnID string, amount float64, currency string) {
          // Type-safe attribute setters
          span.SetAttributes(
              semconv.PaymentTransactionID(txnID),      // string
              semconv.PaymentAmount(amount),             // float64
              semconv.PaymentCurrency(currency),         // string
              semconv.PaymentMethod("credit_card"),      // string
              semconv.PaymentStatus("completed"),        // enum
          )
      }
      ```

      ### Python Usage
      ```python
      from opentelemetry import trace
      from myapp.semconv import (
          payment_transaction_id,
          payment_amount,
          payment_currency,
      )

      def instrument_payment(span, txn_id: str, amount: float, currency: str):
          span.set_attributes([
              payment_transaction_id(txn_id),
              payment_amount(amount),
              payment_currency(currency),
          ])
      ```

      ### TypeScript Usage
      ```typescript
      import { Span } from '@opentelemetry/api';
      import {
          paymentTransactionId,
          paymentAmount,
          paymentCurrency
      } from './semconv';

      function instrumentPayment(span: Span, txnId: string, amount: number, currency: string) {
          span.setAttributes({
              ...paymentTransactionId(txnId),
              ...paymentAmount(amount),
              ...paymentCurrency(currency),
          });
      }
      ```

      ## Custom Templates

      ### Go Template
      ```jinja2
      // Code generated by Weaver. DO NOT EDIT.
      // Source: {{ registry.source }}
      // Version: {{ registry.version }}

      package {{ package_name }}

      import "go.opentelemetry.io/otel/attribute"

      {% for group in groups %}
      // {{ group.brief }}
      {% for attr in group.attributes %}

      // {{ attr.brief }}
      func {{ attr.id | to_go_func_name }}(val {{ attr.type | to_go_type }}) attribute.KeyValue {
          return attribute.{{ attr.type | to_go_attr_func }}("{{ attr.id }}", val)
      }
      {% endfor %}
      {% endfor %}
      ```

      ### Python Template
      ```jinja2
      # Code generated by Weaver. DO NOT EDIT.
      # Source: {{ registry.source }}
      # Version: {{ registry.version }}

      from opentelemetry.attributes import Attribute

      {% for group in groups %}
      # {{ group.brief }}
      {% for attr in group.attributes %}

      def {{ attr.id | to_snake_case }}(value: {{ attr.type | to_python_type }}) -> Attribute:
          """{{ attr.brief }}"""
          return Attribute("{{ attr.id }}", value)
      {% endfor %}
      {% endfor %}
      ```

      ## CI/CD Integration

      ```yaml
      # .github/workflows/generate-code.yaml
      name: Generate Instrumentation Code

      on:
        push:
          paths:
            - 'semconv/**'

      jobs:
        generate:
          runs-on: ubuntu-latest
          strategy:
            matrix:
              language: [go, python, typescript]

          steps:
            - uses: actions/checkout@v4

            - name: Install Weaver
              run: cargo install weaver-cli

            - name: Generate Code
              run: |
                weaver registry generate \
                  --registry=./semconv/registry \
                  ${{ matrix.language }} \
                  --output=./generated/${{ matrix.language }}/

            - name: Verify Generated Code
              run: |
                cd generated/${{ matrix.language }}
                case "${{ matrix.language }}" in
                  go) go build ./... ;;
                  python) python -m py_compile *.py ;;
                  typescript) npx tsc --noEmit ;;
                esac
      ```

      Generate type-safe instrumentation code for your application.

  - id: weaver-registry-check
    content: |
      Check and validate semantic convention registry definitions.

      ## Registry Validation

      Weaver validates your semantic convention registry for:
      - YAML/JSON syntax errors
      - Schema compliance
      - Naming convention violations
      - Duplicate definitions
      - Missing required fields
      - Deprecated attribute usage
      - Type mismatches

      ## Validation Commands

      ### Basic Validation
      ```bash
      # Validate entire registry
      weaver registry check --registry=./semconv/registry

      # Validate specific file
      weaver registry check --registry=./semconv/registry/payment.yaml

      # Validate with strict mode (warnings become errors)
      weaver registry check --registry=./semconv/registry --strict
      ```

      ### Check for Deprecated Attributes
      ```bash
      weaver registry check \
        --registry=./semconv/registry \
        --warn-deprecated
      ```

      ### Compare Against Official OTel Semconv
      ```bash
      weaver registry check \
        --registry=./semconv/registry \
        --baseline=https://github.com/open-telemetry/semantic-conventions
      ```

      ## Registry Structure

      ### Complete Example
      ```yaml
      # semconv/registry/mycompany/payment.yaml
      groups:
        - id: mycompany.payment
          type: attribute_group
          brief: "Semantic conventions for payment transactions"
          prefix: mycompany.payment
          stability: stable

          attributes:
            - id: transaction_id
              type: string
              stability: stable
              brief: "Unique identifier for the payment transaction"
              requirement_level: required
              examples:
                - "txn_abc123"
                - "pay_xyz789"
              note: "Should be globally unique within your system"

            - id: amount
              type: double
              stability: stable
              brief: "Payment amount in the specified currency"
              requirement_level: required
              examples: [99.99, 150.00, 1234.56]

            - id: currency
              type: string
              stability: stable
              brief: "ISO 4217 currency code"
              requirement_level: required
              examples: ["USD", "EUR", "GBP"]

            - id: method
              type:
                allow_custom_values: true
                members:
                  - id: credit_card
                    value: "credit_card"
                    brief: "Credit card payment"
                  - id: debit_card
                    value: "debit_card"
                    brief: "Debit card payment"
                  - id: bank_transfer
                    value: "bank_transfer"
                    brief: "Bank transfer"
                  - id: cryptocurrency
                    value: "cryptocurrency"
                    brief: "Cryptocurrency payment"
              stability: stable
              brief: "Payment method type"
              requirement_level: recommended

            - id: status
              type:
                allow_custom_values: false
                members:
                  - id: pending
                    value: "pending"
                  - id: processing
                    value: "processing"
                  - id: completed
                    value: "completed"
                  - id: failed
                    value: "failed"
                  - id: refunded
                    value: "refunded"
              stability: stable
              brief: "Current status of the payment"
              requirement_level: required

            - id: provider
              type: string
              stability: experimental
              brief: "Payment provider or gateway name"
              requirement_level: recommended
              examples: ["stripe", "paypal", "adyen"]
      ```

      ## Common Validation Issues

      | Issue | Severity | Fix |
      |-------|----------|-----|
      | Missing `brief` | ERROR | Add description to attribute |
      | Missing `type` | ERROR | Specify attribute type |
      | Duplicate ID | ERROR | Rename one attribute |
      | Missing prefix | WARNING | Add `prefix` to group |
      | Deprecated usage | WARNING | Use replacement attribute |
      | Invalid type | ERROR | Use valid type (string, int, double, bool, etc.) |
      | Missing examples | WARNING | Add example values |
      | Invalid requirement_level | ERROR | Use: required, recommended, opt_in, conditionally_required |

      ## CI/CD Integration

      ```yaml
      # .github/workflows/validate-semconv.yaml
      name: Validate Semantic Conventions

      on:
        pull_request:
          paths:
            - 'semconv/**'

      jobs:
        validate:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4

            - name: Install Weaver
              run: cargo install weaver-cli

            - name: Validate Registry
              run: |
                weaver registry check \
                  --registry=./semconv/registry \
                  --strict \
                  --warn-deprecated

            - name: Check Against Baseline
              run: |
                weaver registry check \
                  --registry=./semconv/registry \
                  --baseline=https://github.com/open-telemetry/semantic-conventions
      ```

      Validate your semantic convention registry for correctness.

  - id: weaver-schema-diff
    content: |
      Compare semantic convention schemas across versions.

      ## Overview

      Schema diffing helps you:
      - Track changes between versions
      - Identify breaking changes
      - Generate migration guides
      - Maintain compatibility matrices

      ## Diff Commands

      ### Compare Two Registry Versions
      ```bash
      # Compare local versions
      weaver registry diff \
        --old=./semconv/v1.0.0/registry \
        --new=./semconv/v2.0.0/registry

      # Compare with specific output format
      weaver registry diff \
        --old=./semconv/v1.0.0/registry \
        --new=./semconv/v2.0.0/registry \
        --format=markdown \
        --output=./docs/changelog-v2.md
      ```

      ### Compare with Official OTel Semconv
      ```bash
      weaver registry diff \
        --old=v1.24.0 \
        --new=v1.25.0 \
        --source=https://github.com/open-telemetry/semantic-conventions
      ```

      ### Compare Custom Registry with OTel Baseline
      ```bash
      weaver registry diff \
        --old=https://github.com/open-telemetry/semantic-conventions \
        --new=./semconv/registry \
        --format=json
      ```

      ## Diff Report Format

      ### Markdown Output
      ```markdown
      # Schema Changes: v1.0.0 → v2.0.0

      ## Summary
      - Added: 3 attributes
      - Removed: 1 attribute (BREAKING)
      - Modified: 2 attributes (1 BREAKING)
      - Deprecated: 2 attributes

      ## Breaking Changes ⚠️

      ### Removed Attributes
      | Attribute | Type | Impact |
      |-----------|------|--------|
      | `mycompany.payment.type` | string | Remove from instrumentation |

      ### Modified Attributes (Type Changes)
      | Attribute | Old Type | New Type | Impact |
      |-----------|----------|----------|--------|
      | `mycompany.payment.amount` | double | int | Update instrumentation code |

      ## Non-Breaking Changes

      ### Added Attributes
      | Attribute | Type | Description |
      |-----------|------|-------------|
      | `mycompany.payment.method` | string | Payment method type |
      | `mycompany.payment.provider` | string | Payment provider name |
      | `mycompany.payment.retry_count` | int | Number of retry attempts |

      ### Deprecated Attributes
      | Attribute | Replacement | Migration |
      |-----------|-------------|-----------|
      | `mycompany.payment.legacy_id` | `mycompany.payment.transaction_id` | Use transaction_id instead |
      | `mycompany.payment.old_status` | `mycompany.payment.status` | Use status instead |

      ## Migration Guide

      1. Update instrumentation to use `mycompany.payment.transaction_id` instead of `mycompany.payment.legacy_id`
      2. Change `mycompany.payment.amount` from double to int (multiply by 100 for cents)
      3. Remove references to `mycompany.payment.type`
      ```

      ### JSON Output
      ```json
      {
        "old_version": "1.0.0",
        "new_version": "2.0.0",
        "summary": {
          "added": 3,
          "removed": 1,
          "modified": 2,
          "deprecated": 2,
          "breaking_changes": 2
        },
        "changes": {
          "added": [
            {
              "id": "mycompany.payment.method",
              "type": "string",
              "brief": "Payment method type"
            }
          ],
          "removed": [
            {
              "id": "mycompany.payment.type",
              "breaking": true
            }
          ],
          "modified": [
            {
              "id": "mycompany.payment.amount",
              "old_type": "double",
              "new_type": "int",
              "breaking": true
            }
          ],
          "deprecated": [
            {
              "id": "mycompany.payment.legacy_id",
              "replacement": "mycompany.payment.transaction_id"
            }
          ]
        }
      }
      ```

      ## Generate Migration Guide

      ```bash
      weaver registry migrate \
        --from=v1.0.0 \
        --to=v2.0.0 \
        --output=./docs/migration-guide-v2.md
      ```

      ### Generated Migration Guide
      ```markdown
      # Migration Guide: v1.0.0 → v2.0.0

      ## Breaking Changes

      ### 1. Amount Type Change

      **Before (v1.0.0):**
      ```go
      span.SetAttributes(
          attribute.Float64("mycompany.payment.amount", 99.99),
      )
      ```

      **After (v2.0.0):**
      ```go
      span.SetAttributes(
          attribute.Int64("mycompany.payment.amount", 9999), // cents
      )
      ```

      ### 2. Removed Attribute

      Remove all usages of `mycompany.payment.type`. Use `mycompany.payment.method` instead.

      ## Deprecations

      Replace deprecated attributes:
      - `mycompany.payment.legacy_id` → `mycompany.payment.transaction_id`
      - `mycompany.payment.old_status` → `mycompany.payment.status`
      ```

      ## CI/CD Integration

      ```yaml
      # .github/workflows/schema-diff.yaml
      name: Schema Diff on Release

      on:
        release:
          types: [created]

      jobs:
        diff:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Get Previous Tag
              id: prev_tag
              run: echo "tag=$(git describe --tags --abbrev=0 HEAD^)" >> $GITHUB_OUTPUT

            - name: Generate Diff
              run: |
                weaver registry diff \
                  --old=${{ steps.prev_tag.outputs.tag }} \
                  --new=${{ github.ref_name }} \
                  --format=markdown \
                  --output=./CHANGELOG-${{ github.ref_name }}.md

            - name: Upload Changelog
              uses: actions/upload-artifact@v3
              with:
                name: changelog
                path: ./CHANGELOG-*.md
      ```

      Compare and track changes in your semantic convention schemas.

  - id: validate-telemetry-data
    content: |
      Validate actual telemetry data against semantic convention schemas.

      ## Overview

      Validate that your instrumentation produces telemetry data that complies
      with your semantic convention definitions. This catches issues like:
      - Missing required attributes
      - Wrong attribute types
      - Non-compliant attribute names
      - Deprecated attribute usage

      ## Validation Methods

      ### Method 1: Export and Validate Offline

      ```bash
      # 1. Export sample telemetry data
      curl -s http://backend/api/traces?limit=100 | jq . > traces.json
      curl -s http://backend/api/metrics | jq . > metrics.json
      curl -s http://backend/api/logs?limit=100 | jq . > logs.json

      # 2. Validate against registry
      weaver registry validate \
        --registry=./semconv/registry \
        --telemetry=traces.json

      # 3. Validate all signal types
      weaver registry validate \
        --registry=./semconv/registry \
        --telemetry=./exported-data/ \
        --format=json \
        --output=validation-report.json
      ```

      ### Method 2: Real-time Validation in Collector

      ```yaml
      # otel-collector-config.yaml
      processors:
        schema_validation:
          registry_path: /etc/otel/semconv/registry
          mode: warn  # Options: "warn", "drop", "allow"

          # Report violations to logs
          report_violations: true

          # Allow specific non-compliant attributes (migration period)
          allowed_violations:
            - "mycompany.payment.legacy_id"  # Deprecated but still in use

          # Strict mode for specific groups
          strict_groups:
            - "mycompany.payment"
            - "http"

      service:
        pipelines:
          traces:
            receivers: [otlp]
            processors: [schema_validation, batch]
            exporters: [otlp]
      ```

      ### Method 3: Integration Tests

      ```python
      # test_semantic_conventions.py
      import json
      import subprocess
      import pytest
      from opentelemetry import trace
      from opentelemetry.sdk.trace import TracerProvider
      from opentelemetry.sdk.trace.export import SimpleSpanProcessor
      from opentelemetry.sdk.trace.export.in_memory_span_exporter import InMemorySpanExporter

      @pytest.fixture
      def tracer():
          exporter = InMemorySpanExporter()
          provider = TracerProvider()
          provider.add_span_processor(SimpleSpanProcessor(exporter))
          trace.set_tracer_provider(provider)
          return trace.get_tracer(__name__), exporter

      def test_payment_span_compliance(tracer):
          tracer, exporter = tracer

          # Generate a span
          with tracer.start_as_current_span("process_payment") as span:
              span.set_attribute("mycompany.payment.transaction_id", "txn_123")
              span.set_attribute("mycompany.payment.amount", 9999)
              span.set_attribute("mycompany.payment.currency", "USD")

          # Export to JSON
          spans = exporter.get_finished_spans()
          span_data = [span_to_dict(s) for s in spans]

          with open("/tmp/test_spans.json", "w") as f:
              json.dump(span_data, f)

          # Validate with Weaver
          result = subprocess.run([
              "weaver", "registry", "validate",
              "--registry=./semconv/registry",
              "--telemetry=/tmp/test_spans.json",
              "--strict"
          ], capture_output=True, text=True)

          assert result.returncode == 0, f"Validation failed: {result.stderr}"
      ```

      ### Method 4: CI/CD Pipeline Validation

      ```yaml
      # .github/workflows/validate-telemetry.yaml
      name: Validate Telemetry Data

      on:
        pull_request:
        push:
          branches: [main]

      jobs:
        validate-telemetry:
          runs-on: ubuntu-latest
          services:
            otel-collector:
              image: otel/opentelemetry-collector:latest
              ports:
                - 4317:4317
                - 4318:4318

          steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'

            - name: Install Dependencies
              run: |
                pip install opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp pytest

            - name: Run Application Tests
              run: |
                pytest tests/ --tb=short

            - name: Export Test Telemetry
              run: |
                # Run test suite that generates telemetry
                OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 \
                python -m pytest tests/integration/ -v

                # Export collected telemetry
                curl http://localhost:8888/metrics > test-metrics.txt

            - name: Install Weaver
              run: cargo install weaver-cli

            - name: Validate Telemetry
              run: |
                weaver registry validate \
                  --registry=./semconv/registry \
                  --telemetry=${{ github.workspace }}/test-data/ \
                  --format=markdown \
                  --output=validation-report.md

            - name: Check for Violations
              run: |
                if grep -q "ERROR" validation-report.md; then
                  echo "❌ Telemetry validation failed"
                  cat validation-report.md
                  exit 1
                fi
                echo "✅ Telemetry validation passed"

            - name: Upload Report
              uses: actions/upload-artifact@v3
              with:
                name: validation-report
                path: validation-report.md
      ```

      ## Validation Report Format

      ```markdown
      # Telemetry Validation Report

      **Generated:** 2024-01-17T10:30:00Z
      **Registry Version:** 1.2.0
      **Data Source:** ./exported-data/

      ## Summary

      | Signal | Total | Valid | Warnings | Errors |
      |--------|-------|-------|----------|--------|
      | Traces | 1,234 | 1,180 | 42 | 12 |
      | Metrics | 567 | 567 | 0 | 0 |
      | Logs | 890 | 845 | 35 | 10 |

      Overall Compliance: **95.6%**

      ## Errors (Must Fix)

      | Issue | Count | Affected Spans | Severity |
      |-------|-------|----------------|----------|
      | Missing `http.method` | 8 | span_abc, span_def, ... | ERROR |
      | Wrong type for `http.status_code` | 4 | span_xyz, ... | ERROR |
      | Missing required `mycompany.payment.transaction_id` | 3 | span_pay1, ... | ERROR |

      ### Error Details

      #### Missing http.method
      **Affected Spans:** 8
      **Expected:** http.method (string, required)
      **Found:** Attribute not present

      **Fix:**
      ```go
      span.SetAttributes(
          semconv.HTTPMethod("GET"),  // Add this
      )
      ```

      ## Warnings (Should Fix)

      | Issue | Count | Severity |
      |-------|-------|----------|
      | Deprecated `net.peer.name` | 42 | WARNING |
      | Missing recommended `http.route` | 35 | WARNING |

      ### Deprecation: net.peer.name
      **Replacement:** `server.address`
      **Migration:**
      ```go
      // Before
      attribute.String("net.peer.name", "api.example.com")

      // After
      attribute.String("server.address", "api.example.com")
      ```

      ## Recommendations

      1. **Critical:** Add `http.method` to all HTTP spans (8 occurrences)
      2. **Critical:** Fix `http.status_code` type from string to int (4 occurrences)
      3. **High:** Migrate from `net.peer.name` to `server.address` (42 occurrences)
      4. **Medium:** Add `http.route` for better cardinality (35 occurrences)

      ## Compliance Trend

      | Date | Compliance |
      |------|------------|
      | 2024-01-10 | 92.1% |
      | 2024-01-15 | 94.3% |
      | 2024-01-17 | 95.6% |

      Target: 99%+ for production readiness
      ```

      Validate your telemetry data against semantic conventions.

  # OPENTELEMETRY COLLECTOR BUILDER (OCB) PROMPTS
  # ═══════════════════════════════════════════════════════

  - id: ocb-add-component
    content: |
      Add receiver/processor/exporter/extension to OpenTelemetry Collector Builder manifest.
      
      ## Component Categories
      
      ### Receivers (Data Input)
      
      **Popular Receivers:**
      - `otlpreceiver` - OTLP protocol (gRPC + HTTP)
      - `prometheusreceiver` - Scrape Prometheus metrics
      - `jaegerreceiver` - Jaeger traces
      - `zipkinreceiver` - Zipkin traces
      - `kafkareceiver` - Consume from Kafka
      - `filelogreceiver` - Read log files
      - `hostmetricsreceiver` - Host system metrics
      - `k8sclusterreceiver` - Kubernetes cluster metrics
      - `kubeletstatsreceiver` - Kubelet metrics
      - `prometheusremotewritereceiver` - Prometheus remote write
      
      **Database Receivers:**
      - `postgresqlreceiver` - PostgreSQL metrics
      - `mysqlreceiver` - MySQL metrics
      - `mongodbreceiver` - MongoDB metrics
      - `redisreceiver` - Redis metrics
      
      **Infrastructure Receivers:**
      - `dockerstatsreceiver` - Docker container stats
      - `awscontainerinsightsreceiver` - ECS/EKS insights
      - `nginxreceiver` - NGINX metrics
      - `apachereceiver` - Apache metrics
      
      ### Processors (Data Transformation)
      
      **Essential Processors:**
      - `batchprocessor` - Batch data for performance
      - `memorylimiterprocessor` - Prevent OOM
      - `resourceprocessor` - Add/modify resource attributes
      - `attributesprocessor` - Add/modify/delete attributes
      - `filterprocessor` - Filter telemetry data
      - `transformprocessor` - OTTL transformations
      
      **Advanced Processors:**
      - `tailsamplingprocessor` - Intelligent sampling
      - `probabilisticsamplerprocessor` - Head-based sampling
      - `spanprocessor` - Modify span attributes
      - `metricstransformprocessor` - Transform metrics
      - `k8sattributesprocessor` - Add K8s metadata
      - `resourcedetectionprocessor` - Detect cloud metadata
      - `spanmetricsprocessor` - Generate metrics from spans
      - `servicegraphprocessor` - Build service graphs
      
      ### Exporters (Data Output)
      
      **OTLP Exporters:**
      - `otlpexporter` - OTLP gRPC
      - `otlphttpexporter` - OTLP HTTP
      
      **Metrics Exporters:**
      - `prometheusexporter` - Prometheus exposition
      - `prometheusremotewriteexporter` - Prometheus remote write
      
      **Traces Exporters:**
      - `jaegerexporter` - Jaeger
      - `zipkinexporter` - Zipkin
      
      **Logs Exporters:**
      - `lokiexporter` - Grafana Loki
      - `elasticsearchexporter` - Elasticsearch
      
      **Vendor Exporters:**
      - `datadogexporter` - Datadog
      - `newrelicexporter` - New Relic
      - `honeycombexporter` - Honeycomb
      - `awsxrayexporter` - AWS X-Ray
      - `googlecloudexporter` - Google Cloud
      - `azuremonitorexporter` - Azure Monitor
      
      **Other Exporters:**
      - `fileexporter` - Export to file
      - `kafkaexporter` - Send to Kafka
      - `loadbalancingexporter` - Load balance across backends
      
      ### Extensions (Extra Functionality)
      
      - `healthcheckextension` - Health check endpoint
      - `pprofextension` - Performance profiling
      - `zpagesextension` - Debugging pages
      - `filestorage` - Persistent storage
      - `bearertokenauthextension` - Bearer token auth
      - `oauth2clientauthextension` - OAuth2 auth
      - `headerssetterextension` - Set HTTP headers
      
      ## Adding Components to Manifest
      
      ### Step 1: Locate Component
```bash
      # Search for component in contrib
      # Format: github.com/open-telemetry/opentelemetry-collector-contrib/<type>/<name>
      
      # Example component paths:
      # Receiver: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
      # Processor: github.com/open-telemetry/opentelemetry-collector-contrib/processor/tailsamplingprocessor
      # Exporter: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/datadogexporter
```
      
      ### Step 2: Find Version
```bash
      # Check latest version
      go list -m -versions github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
      
      # Or use same version as collector core
      COLLECTOR_VERSION="v0.93.0"
```
      
      ### Step 3: Add to Manifest
```yaml
      # builder-config.yaml
      dist:
        name: otelcol-custom
        description: Custom OpenTelemetry Collector
        output_path: ./dist
        otelcol_version: 0.93.0
      
      receivers:
        # Core receiver (always include)
        - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.93.0
        
        # Add Prometheus receiver
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver v0.93.0
        
        # Add Jaeger receiver
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/jaegerreceiver v0.93.0
        
        # Add Kafka receiver
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kafkareceiver v0.93.0
      
      processors:
        # Core processors
        - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.93.0
        - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.93.0
        
        # Add tail sampling
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/tailsamplingprocessor v0.93.0
        
        # Add K8s attributes
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/k8sattributesprocessor v0.93.0
        
        # Add transform processor
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor v0.93.0
      
      exporters:
        # Core exporter
        - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.93.0
        
        # Add Prometheus exporter
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusexporter v0.93.0
        
        # Add Datadog exporter
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/datadogexporter v0.93.0
      
      extensions:
        # Add health check
        - gomod: go.opentelemetry.io/collector/extension/healthcheckextension v0.93.0
        
        # Add pprof
        - gomod: go.opentelemetry.io/collector/extension/pprofextension v0.93.0
        
        # Add file storage
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/storage/filestorage v0.93.0
```
      
      ### Step 4: Add Custom Components
      
      For your own custom receivers/processors/exporters:
```yaml
      receivers:
        # ... other receivers ...
        
        # Custom receiver (local development)
        - gomod: github.com/mycompany/myreceiver v1.0.0
          path: /path/to/local/myreceiver  # Optional: use local copy
      
      # OR use replace directive
      replaces:
        - github.com/mycompany/myreceiver => /path/to/local/myreceiver
```
      
      ### Step 5: Validate Manifest
```bash
      # Validate before building
      builder --config builder-config.yaml --skip-compilation
      
      # Check for version conflicts
      go list -m all
```
      
      ## Common Component Combinations
      
      ### Kubernetes Monitoring
```yaml
      receivers:
        - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kubeletstatsreceiver v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8seventsreceiver v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/filelogreceiver v0.93.0
      
      processors:
        - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.93.0
        - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/k8sattributesprocessor v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourcedetectionprocessor v0.93.0
```
      
      ### Database Monitoring
```yaml
      receivers:
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/postgresqlreceiver v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/mysqlreceiver v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/mongodbreceiver v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/redisreceiver v0.93.0
```
      
      ### Multi-Backend Export
```yaml
      exporters:
        - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusremotewriteexporter v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/lokiexporter v0.93.0
        - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/datadogexporter v0.93.0
```
      
      Generate component selection and manifest configuration.

