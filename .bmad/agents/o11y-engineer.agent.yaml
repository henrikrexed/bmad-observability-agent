  - id: bmad-epic-story-creation
    content: |
      Create epics and user stories for tracking observability implementation progress.

      ## Epic/Story Format

      Use this structure for BMAD-compatible tracking:

      ```yaml
      # BMAD Observability Epic
      epic:
        id: "OBS-{number}"
        title: "{Epic Title}"
        description: |
          {Detailed description of the epic}
        owner: "o11y-engineer-agent"
        status: "{draft/active/completed/blocked}"
        priority: "{critical/high/medium/low}"
        target_score: {target quality score}
        current_score: {current quality score}

        acceptance_criteria:
          - "{criterion 1}"
          - "{criterion 2}"

        stories:
          - id: "OBS-{epic}-{number}"
            title: "{Story Title}"
            description: |
              {Story description}
            status: "{todo/in_progress/done/blocked}"
            priority: "{critical/high/medium/low}"
            estimated_effort: "{time}"
            actual_effort: "{time or null}"
            assigned_agent: "{agent name or null}"

            tasks:
              - description: "{task}"
                status: "{todo/done}"
              - description: "{task}"
                status: "{todo/done}"

            acceptance_criteria:
              - "{criterion}"

            dependencies:
              - "{story id or external dependency}"

            artifacts:
              - type: "{file/config/dashboard}"
                path: "{path}"
                status: "{created/modified/pending}"
      ```

      ## Standard Observability Epics

      ### Epic 1: Foundation Setup
      ```yaml
      epic:
        id: "OBS-001"
        title: "Observability Foundation Setup"
        description: |
          Establish core observability infrastructure including
          OpenTelemetry Collector deployment and basic signal collection.
        status: "active"
        priority: "critical"
        target_score: 60

        stories:
          - id: "OBS-001-01"
            title: "Deploy OpenTelemetry Collector"
            status: "todo"
            priority: "critical"
            estimated_effort: "2 hours"
            tasks:
              - description: "Create collector configuration"
                status: "todo"
              - description: "Deploy to Kubernetes"
                status: "todo"
              - description: "Verify health endpoint"
                status: "todo"

          - id: "OBS-001-02"
            title: "Configure memory_limiter processor"
            status: "todo"
            priority: "critical"
            estimated_effort: "30 minutes"
            dependencies: ["OBS-001-01"]

          - id: "OBS-001-03"
            title: "Scale collector to HA (3 replicas)"
            status: "todo"
            priority: "high"
            estimated_effort: "30 minutes"
            dependencies: ["OBS-001-01"]
      ```

      ### Epic 2: Instrumentation
      ```yaml
      epic:
        id: "OBS-002"
        title: "Application Instrumentation"
        description: |
          Instrument all services with OpenTelemetry for traces,
          metrics, and logs with proper semantic conventions.
        status: "draft"
        priority: "high"
        target_score: 80

        stories:
          - id: "OBS-002-01"
            title: "Enable auto-instrumentation via K8s Operator"
            status: "todo"
            priority: "high"
            estimated_effort: "4 hours"

          - id: "OBS-002-02"
            title: "Add trace context to application logs"
            status: "todo"
            priority: "high"
            estimated_effort: "2 hours"

          - id: "OBS-002-03"
            title: "Validate semantic convention compliance"
            status: "todo"
            priority: "medium"
            estimated_effort: "2 hours"
      ```

      ### Epic 3: Production Readiness
      ```yaml
      epic:
        id: "OBS-003"
        title: "Production Readiness"
        description: |
          Achieve production-ready observability with SLOs,
          alerting, dashboards, and operational maturity.
        status: "draft"
        priority: "high"
        target_score: 90

        stories:
          - id: "OBS-003-01"
            title: "Define SLOs for critical services"
            status: "todo"
            priority: "critical"
            estimated_effort: "4 hours"

          - id: "OBS-003-02"
            title: "Configure alerting for SLO violations"
            status: "todo"
            priority: "critical"
            estimated_effort: "2 hours"
            dependencies: ["OBS-003-01"]

          - id: "OBS-003-03"
            title: "Create service dashboards"
            status: "todo"
            priority: "high"
            estimated_effort: "4 hours"

          - id: "OBS-003-04"
            title: "Implement tail-based sampling"
            status: "todo"
            priority: "high"
            estimated_effort: "2 hours"
      ```

      ## Story Status Updates

      When completing work, update stories:

      ```yaml
      story_update:
        id: "OBS-001-01"
        previous_status: "in_progress"
        new_status: "done"
        completion_timestamp: "2024-01-17T11:00:00Z"
        actual_effort: "2.5 hours"
        notes: "Deployed with 3 replicas, health check verified"
        artifacts_created:
          - type: "config"
            path: "k8s/otel-collector/deployment.yaml"
          - type: "config"
            path: "k8s/otel-collector/configmap.yaml"
      ```

