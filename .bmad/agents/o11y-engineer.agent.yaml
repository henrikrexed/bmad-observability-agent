  - id: request-semconv-change
    content: |
      Guide the user to create PRD, epic, and stories for semantic convention changes.

      ## Semantic Convention Change Request

      You want to make changes to semantic conventions. This requires proper documentation.

      ### Step 1: Understand the Change

      First, tell me about your semantic convention change:
      - What attributes are being added/modified/removed?
      - What namespace will be affected?
      - Why is this change needed?
      - What services will be impacted?

      ### Step 2: User Creates PRD

      **Action Required:** Please create or update the PRD file.

      **Location:** `_bmad-output/prd/semconv-change-prd.md`

      **Template:**
      ```markdown
      # Semantic Convention Change PRD

      ## Overview
      [Describe the semantic convention change]

      ## Problem Statement
      [Why current conventions don't meet needs]

      ## Proposed Changes
      | Attribute | Type | Action | Description |
      |-----------|------|--------|-------------|
      | [name] | [type] | add/modify/remove | [description] |

      ## Namespace
      - Affected namespace: [namespace]
      - New namespace needed: [yes/no]

      ## Success Criteria
      - [ ] Schema validates with Weaver
      - [ ] 95%+ compliance achieved
      - [ ] Documentation generated
      - [ ] Instrumentation code updated

      ## Impact Assessment
      - Services affected: [list]
      - Breaking changes: [yes/no - describe]
      - Migration needed: [yes/no - describe]
      ```

      **Please create this file and let me know when ready.**

      ### Step 3: User Creates Epic

      **Action Required:** Please create the epic file.

      **Location:** `_bmad-output/epics/semconv-change-epic.yaml`

      **Template:**
      ```yaml
      epic:
        id: "SEMCONV-{number}"
        title: "Semantic Convention Change: [description]"
        description: |
          [From PRD]
        owner: "o11y-engineer"
        status: "draft"
        priority: "high"
        prd_reference: "_bmad-output/prd/semconv-change-prd.md"
        change_categories:
          semantic_conventions: true
          instrumentation: true
          logging: false
          metrics: false

        acceptance_criteria:
          - "Weaver schema validates"
          - "Documentation generated"
          - "Instrumentation code updated"
          - "All services pass compliance check"

        stories: []
      ```

      ### Step 4: User Adds Stories

      **Action Required:** Add stories to your epic file.

      **Suggested Stories:**
      ```yaml
      stories:
        - id: "SEMCONV-{epic}-01"
          title: "Create/Update Weaver Schema"
          status: "todo"
          priority: "critical"
          tasks:
            - description: "Define attribute schema"
              status: "todo"
            - description: "Validate with Weaver"
              status: "todo"

        - id: "SEMCONV-{epic}-02"
          title: "Generate Instrumentation Code"
          status: "todo"
          priority: "high"
          dependencies: ["SEMCONV-{epic}-01"]
          tasks:
            - description: "Generate Go constants"
              status: "todo"
            - description: "Generate Python constants"
              status: "todo"

        - id: "SEMCONV-{epic}-03"
          title: "Update Application Instrumentation"
          status: "todo"
          priority: "high"
          dependencies: ["SEMCONV-{epic}-02"]

        - id: "SEMCONV-{epic}-04"
          title: "Validate Compliance"
          status: "todo"
          priority: "high"
          dependencies: ["SEMCONV-{epic}-03"]
      ```

      **Please add these stories and confirm when ready.**

      Once all files are created, I can help you execute the implementation using:
      - `validate-semconv` - Validate current compliance
      - `create-custom-semconv` - Create the new conventions
      - `generate-instrumentation-code` - Generate code from schemas

