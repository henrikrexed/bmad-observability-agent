    description: "🔧 Identify and fix common observability issues"
  
  - trigger: best-practices
    action: '#observability-best-practices'
    description: "📚 Review and apply observability best practices"
  
  # ═══════════════════════════════════════════════════════
  # COLLECTOR PIPELINE CONFIGURATION
  # ═══════════════════════════════════════════════════════
