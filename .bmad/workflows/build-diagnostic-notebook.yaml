name: Build Diagnostic Notebook
version: 2.1.0
description: Build a Dynatrace notebook for service diagnosis using dtctl YAML format

knowledge_required:
  - "{project-root}/.bmad/knowledge/dynatrace-formats.yaml"

output_directory: "{project-root}/_bmad-output/dynatrace/notebooks"

steps:
  - step: select-service
    ask: |
      Which service do you want to create a diagnostic notebook for?

      Provide:
      - Service name:
      - Notebook purpose: (Incident Analysis / Performance Investigation / General Diagnosis)
      - Time range focus: (Last hour / Last day / Custom)

    save_to: service_context

  - step: discover-data-schema
    prompt: |
      Use DQL to discover the data schema for the selected service.

      1. Discover log attributes:
      ```dql
      fetch logs
      | filter service.name == "{{service_name}}"
      | limit 1
      | fields *
      ```

      2. Discover span attributes:
      ```dql
      fetch spans
      | filter service.name == "{{service_name}}"
      | limit 1
      | fields *
      ```

      3. Discover available metrics:
      ```dql
      timeseries values=avg(http_request_duration_seconds), by:{route}
      | limit 20
      ```

      Document discovered schema for notebook generation.

    save_to: data_schema

  - step: generate-notebook
    prompt: |
      Generate a comprehensive Dynatrace diagnostic notebook using **dtctl YAML format**.

      **CRITICAL**: Load and follow the format from:
      `{project-root}/.bmad/knowledge/dynatrace-formats.yaml` → `dynatrace_formats.notebook`

      ## Service Context
      {{service_context}}

      ## Schema
      {{data_schema}}

      ## Required dtctl YAML Structure (version "7")
      ```yaml
      type: notebook
      name: "{{service_name}} Diagnosis"
      content:
        version: "7"
        defaultTimeframe:
          from: now()-2h
          to: now()
        sections:
          - id: "section-uuid-1"
            type: markdown
            markdown: |
              # Service Diagnosis Notebook
          - id: "section-uuid-2"
            type: dql
            state:
              input:
                value: |
                  fetch spans
                  | filter service.name == "{{service_name}}"
                  | filter status.code == "ERROR"
                  | limit 50
                timeframe:
                  from: now()-2h
                  to: now()
              visualization: table
              visualizationSettings:
                table:
                  hideColumnsForLargeResults: true
                autoSelectVisualization: true
              querySettings:
                maxResultRecords: 1000
                defaultScanLimitGbytes: 500
                maxResultMegaBytes: 1
                defaultSamplingRatio: 10
                enableSampling: false
            davis:
              includeLogs: true
              davisVisualization:
                isAvailable: true
      ```

      ## Notebook Sections to Include

      ### Section 1: Service Overview (markdown)
      - Service description and key SLIs
      - How to use this notebook

      ### Section 2: Error Analysis (dql)
      ```dql
      fetch logs
      | filter service.name == "{{service_name}}"
      | filter loglevel == "ERROR" OR loglevel == "error"
      | sort timestamp desc
      | limit 50
      | fields timestamp, content, trace_id
      ```

      ### Section 3: Error Traces (dql)
      ```dql
      fetch spans
      | filter service.name == "{{service_name}}"
      | filter status.code == "ERROR"
      | sort start_time desc
      | limit 20
      | fields start_time, trace_id, span.name, duration/1000000 as duration_ms, error.message
      ```

      ### Section 4: Latency Analysis (dql)
      ```dql
      fetch spans
      | filter service.name == "{{service_name}}" AND span.kind == "SERVER"
      | summarize {
          p50=percentile(duration, 50)/1000000,
          p95=percentile(duration, 95)/1000000,
          p99=percentile(duration, 99)/1000000
        }, by:{http.route}
      | sort p95 desc
      ```

      ### Section 5: Slow Requests (dql)
      ```dql
      fetch spans
      | filter service.name == "{{service_name}}"
      | filter duration > 2000000000
      | sort duration desc
      | limit 20
      | fields start_time, trace_id, span.name, http.route, duration/1000000 as duration_ms
      ```

      ### Section 6: Trace-Log Correlation (markdown)
      Instructions on using trace_id to correlate

      ### Section 7: Logs for Trace (dql - parametric)
      ```dql
      // Replace TRACE_ID with actual trace ID
      fetch logs
      | filter trace_id == "TRACE_ID_HERE"
      | sort timestamp asc
      | fields timestamp, loglevel, content
      ```

      ## Key Requirements
      - Use version: "7" (string, not integer)
      - Sections is an ARRAY (not object like dashboard tiles)
      - Each section needs unique id (UUID)
      - DQL sections have nested state.input.value for query
      - Generate unique UUIDs for each section id

      ## Output
      Save to: `{output_directory}/{{service_name}}-diagnosis.yaml`

      ## Deployment Commands
      ```bash
      # Deploy using dtctl
      dtctl apply -f {{service_name}}-diagnosis.yaml

      # Dry run first
      dtctl apply -f {{service_name}}-diagnosis.yaml --dry-run
      ```
