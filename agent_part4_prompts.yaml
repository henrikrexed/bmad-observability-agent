  - id: auto-instrumentation
    content: |
      Generate auto-instrumentation configuration (zero code changes).
      
      ## Method 1: Kubernetes Operator (Recommended)
      
      ### Step 1: Install Cert Manager (if not already installed)
````bash
      kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml
      
      # Wait for cert-manager to be ready
      kubectl wait --for=condition=Available --timeout=300s \
        deployment/cert-manager -n cert-manager
````
      
      ### Step 2: Install OpenTelemetry Operator
````bash
      kubectl apply -f https://github.com/open-telemetry/opentelemetry-operator/releases/latest/download/opentelemetry-operator.yaml
      
      # Verify installation
      kubectl get deployment -n opentelemetry-operator-system
````
      
      ### Step 3: Create Instrumentation Resource
````yaml
      apiVersion: opentelemetry.io/v1alpha1
      kind: Instrumentation
      metadata:
        name: app-instrumentation
        namespace: default
      spec:
        exporter:
          endpoint: http://otelcol.observability.svc.cluster.local:4317
        
        propagators:
          - tracecontext
          - baggage
        
        sampler:
          type: parentbased_traceidratio
          argument: "0.1"  # 10% sampling
        
        # Java instrumentation
        java:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:latest
          env:
            # Reduce noise in logs
            - name: OTEL_JAVAAGENT_LOGGING
              value: "application"
            # Additional JVM options if needed
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx512m"
        
        # Python instrumentation
        python:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:latest
          env:
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
              value: "true"
        
        # Node.js instrumentation
        nodejs:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:latest
          env:
            - name: OTEL_NODEJS_DEBUG
              value: "false"
        
        # .NET instrumentation
        dotnet:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:latest
          env:
            - name: OTEL_DOTNET_AUTO_LOGS_INCLUDE_FORMATTED_MESSAGE
              value: "true"
````
      
      ### Step 4: Annotate Your Deployment
````yaml
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: payment-service
        namespace: default
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: payment-service
        template:
          metadata:
            labels:
              app: payment-service
            annotations:
              # Choose one based on your language:
              instrumentation.opentelemetry.io/inject-java: "true"
              # instrumentation.opentelemetry.io/inject-python: "true"
              # instrumentation.opentelemetry.io/inject-nodejs: "true"
              # instrumentation.opentelemetry.io/inject-dotnet: "true"
          spec:
            containers:
            - name: app
              image: myregistry/payment-service:1.2.3
              ports:
              - containerPort: 8080
              env:
                # Required resource attributes
                - name: OTEL_SERVICE_NAME
                  value: "payment-service"
                - name: OTEL_RESOURCE_ATTRIBUTES
                  value: "service.version=1.2.3,deployment.environment=production,service.namespace=ecommerce"
````
      
      ### Step 5: Deploy and Verify
````bash
      # Apply the deployment
      kubectl apply -f payment-service-deployment.yaml
      
      # Check if instrumentation was injected
      kubectl get pod -l app=payment-service -o yaml | grep -A 5 "OTEL"
      
      # Check application logs for OTel initialization
      kubectl logs -l app=payment-service | grep -i "opentelemetry\|otel"
      
      # Expected output:
      # [otel.javaagent] OpenTelemetry Javaagent started
      # [otel.javaagent] Exporting to http://otelcol:4317
````
      
      ## Method 2: eBPF-Based Auto-Instrumentation
      
      ### Option A: Beyla (by Grafana)
      
      **Supports:** Go, Rust, C/C++, Java, .NET, Node.js, Python, Ruby
````yaml
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: beyla
        namespace: observability
      spec:
        selector:
          matchLabels:
            app: beyla
        template:
          metadata:
            labels:
              app: beyla
          spec:
            hostPID: true  # Required for eBPF
            containers:
            - name: beyla
              image: grafana/beyla:latest
              securityContext:
                privileged: true  # Required for eBPF
              env:
                - name: BEYLA_OPEN_PORT
                  value: "8080,443"  # Ports to instrument
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: "http://otelcol:4317"
                - name: OTEL_SERVICE_NAME
                  value: "auto-discovered"  # Or set specific name
              volumeMounts:
              - name: sys
                mountPath: /sys
                readOnly: true
            volumes:
            - name: sys
              hostPath:
                path: /sys
````
      
      ### Option B: Odigos
      
      **Supports:** Go, Java, Python, .NET, Node.js
````bash
      # Install Odigos via Helm
      helm repo add odigos https://keyval-dev.github.io/odigos-charts/
      helm install odigos odigos/odigos --namespace odigos-system --create-namespace
      
      # Install Odigos CLI
      brew install keyval-dev/homebrew-odigos-cli/odigos
      
      # Configure Odigos
      odigos install
      
      # Add instrumentation to namespace
      odigos instrument namespace default
      
      # Configure destination (OTel Collector)
      odigos destination add otlp-collector \
        --type otlp \
        --endpoint http://otelcol.observability:4317
````
      
      ## Method 3: Language-Specific Agents
      
      ### Java (No code changes)
````dockerfile
      FROM openjdk:17-slim
      
      # Download OpenTelemetry Java agent
      ADD https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/latest/download/opentelemetry-javaagent.jar /opt/
      
      COPY target/myapp.jar /app.jar
      
      # Add agent to JVM
      ENV JAVA_TOOL_OPTIONS="-javaagent:/opt/opentelemetry-javaagent.jar"
      ENV OTEL_SERVICE_NAME="payment-service"
      ENV OTEL_EXPORTER_OTLP_ENDPOINT="http://otelcol:4317"
      ENV OTEL_RESOURCE_ATTRIBUTES="service.version=1.2.3,deployment.environment=production"
      
      ENTRYPOINT ["java", "-jar", "/app.jar"]
````
      
      ### Python (via opentelemetry-instrument)
````dockerfile
      FROM python:3.11-slim
      
      WORKDIR /app
      
      # Install dependencies
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      
      # Install OpenTelemetry auto-instrumentation
      RUN pip install opentelemetry-distro opentelemetry-exporter-otlp
      RUN opentelemetry-bootstrap -a install
      
      COPY . .
      
      ENV OTEL_SERVICE_NAME="payment-service"
      ENV OTEL_EXPORTER_OTLP_ENDPOINT="http://otelcol:4317"
      ENV OTEL_RESOURCE_ATTRIBUTES="service.version=1.2.3,deployment.environment=production"
      
      # Run with auto-instrumentation
      CMD ["opentelemetry-instrument", "python", "app.py"]
````
      
      ### Node.js (via require hook)
````dockerfile
      FROM node:18-slim
      
      WORKDIR /app
      
      # Install dependencies
      COPY package*.json ./
      RUN npm install
      
      # Install OpenTelemetry packages
      RUN npm install --save @opentelemetry/api \
                            @opentelemetry/auto-instrumentations-node \
                            @opentelemetry/exporter-trace-otlp-grpc
      
      COPY . .
      
      ENV OTEL_SERVICE_NAME="payment-service"
      ENV OTEL_EXPORTER_OTLP_ENDPOINT="http://otelcol:4317"
      ENV OTEL_RESOURCE_ATTRIBUTES="service.version=1.2.3,deployment.environment=production"
      
      # Auto-instrument via NODE_OPTIONS
      ENV NODE_OPTIONS="--require @opentelemetry/auto-instrumentations-node/register"
      
      CMD ["node", "app.js"]
````
      
      ### .NET (via startup hook)
````dockerfile
      FROM mcr.microsoft.com/dotnet/aspnet:7.0 AS runtime
      
      WORKDIR /app
      
      # Install OpenTelemetry auto-instrumentation
      RUN apt-get update && apt-get install -y wget unzip
      RUN wget https://github.com/open-telemetry/opentelemetry-dotnet-instrumentation/releases/latest/download/otel-dotnet-auto-install.sh
      RUN sh ./otel-dotnet-auto-install.sh
      
      COPY --from=build /app/publish .
      
      ENV OTEL_SERVICE_NAME="payment-service"
      ENV OTEL_EXPORTER_OTLP_ENDPOINT="http://otelcol:4317"
      ENV OTEL_RESOURCE_ATTRIBUTES="service.version=1.2.3,deployment.environment=production"
      ENV OTEL_DOTNET_AUTO_HOME="/otel-dotnet-auto"
      ENV DOTNET_STARTUP_HOOKS="/otel-dotnet-auto/net/OpenTelemetry.AutoInstrumentation.StartupHook.dll"
      
      ENTRYPOINT ["dotnet", "MyApp.dll"]
````
      
      ## Validation Steps
      
      After enabling auto-instrumentation:
````bash
      # 1. Check pods are running
      kubectl get pods -l app=payment-service
      
      # 2. Check for OTel environment variables
      kubectl exec -it <pod-name> -- env | grep OTEL
      
      # 3. Check application logs for OTel initialization
      kubectl logs <pod-name> | grep -i "opentelemetry\|instrumentation"
      
      # Expected:
      # - "OpenTelemetry auto-instrumentation enabled"
      # - "Exporting to http://otelcol:4317"
      # - No errors about missing dependencies
      
      # 4. Check collector is receiving data
      kubectl logs -l app=otelcol -n observability | grep "TracesReceived"
      
      # 5. Verify in backend
      # - Service should appear in service list
      # - Traces should have proper attributes
      # - HTTP/DB calls should be instrumented
````
      
      ## Troubleshooting
      
      ### Issue: No traces appearing
      
      **Check:**
````bash
      # Is instrumentation annotation correct?
      kubectl get pod <pod-name> -o yaml | grep "instrumentation.opentelemetry.io"
      
      # Are OTel containers injected?
      kubectl get pod <pod-name> -o yaml | grep -A 10 "initContainers"
      
      # Is operator running?
      kubectl get pods -n opentelemetry-operator-system
      
      # Check operator logs
      kubectl logs -n opentelemetry-operator-system -l app.kubernetes.io/name=opentelemetry-operator
````
      
      ### Issue: Application failing to start
      
      **Check:**
````bash
      # Check application logs
      kubectl logs <pod-name>
      
      # Common issues:
      # - OOM (increase memory limits)
      # - Incompatible Java version
      # - Missing dependencies
      
      # Temporarily disable instrumentation to verify
      kubectl annotate deployment payment-service instrumentation.opentelemetry.io/inject-java-
````
      
      ### Issue: High overhead / performance impact
      
      **Fix:**
````yaml
      # Reduce sampling rate
      spec:
        sampler:
          type: parentbased_traceidratio
          argument: "0.01"  # 1% instead of 10%
      
      # Or disable specific instrumentations
      env:
        - name: OTEL_INSTRUMENTATION_JDBC_ENABLED
          value: "false"  # Disable JDBC instrumentation
````
      
      ## Comparison Matrix
      
      | Method | Pros | Cons | Best For |
      |--------|------|------|----------|
      | **K8s Operator** | Easy, declarative, supports multiple languages | Requires K8s, some overhead | Most K8s deployments |
      | **eBPF (Beyla)** | Zero code change, works for compiled languages | Linux only, limited customization | Go, Rust, C/C++ apps |
      | **eBPF (Odigos)** | Automatic detection, easy setup | Commercial features, learning curve | Multi-language environments |
      | **Language Agents** | Works anywhere, full control | Requires Dockerfile changes | Non-K8s deployments |
      
      Generate complete auto-instrumentation configuration for user's environment.

  - id: instrumentation-score
    content: |
      Calculate observability instrumentation quality score (0-100) and provide improvement roadmap.
      
      ## Scoring Framework
      
      Total: 100 points across 6 categories
      
      ### Category 1: Signal Coverage (30 points)
      
      **Traces (10 points):**
      - ✅ HTTP requests instrumented (3 pts)
      - ✅ Database calls instrumented (3 pts)
      - ✅ External API calls instrumented (2 pts)
      - ✅ Async operations instrumented (2 pts)
      
      **Metrics (10 points):**
      - ✅ Request count/rate (3 pts)
      - ✅ Request duration (histogram) (3 pts)
      - ✅ Error count/rate (2 pts)
      - ✅ Custom business metrics (2 pts)
      
      **Logs (5 points):**
      - ✅ Structured logging (3 pts)
      - ✅ Appropriate log levels (2 pts)
      
      **Profiling (5 points):**
      - ✅ Continuous profiling enabled (5 pts)
      - Optional but highly recommended
      
      ### Category 2: Signal Correlation (25 points)
      
      **Trace Context in Logs (10 points):**
      - ✅ trace_id in logs (5 pts)
      - ✅ span_id in logs (3 pts)
      - ✅ service.name in logs (2 pts)
      
      **Exemplars (5 points):**
      - ✅ Exemplars enabled on metrics (5 pts)
      - Links metrics → traces
      
      **Resource Attributes (5 points):**
      - ✅ Consistent across all signals (5 pts)
      - service.name, service.version, deployment.environment
      
      **Span Links (5 points):**
      - ✅ Links for async operations (3 pts)
      - ✅ Links for batch processing (2 pts)
      
      ### Category 3: Semantic Conventions (20 points)
      
      **HTTP Semantic Conventions (5 points):**
      - ✅ http.method (required) (2 pts)
      - ✅ http.status_code (required) (2 pts)
      - ✅ http.route (recommended) (1 pt)
      
      **Database Semantic Conventions (5 points):**
      - ✅ db.system (required) (2 pts)
      - ✅ db.statement (required) (2 pts)
      - ✅ db.name (recommended) (1 pt)
      
      **Messaging Semantic Conventions (5 points):**
      - ✅ messaging.system (required) (2 pts)
      - ✅ messaging.operation (required) (2 pts)
      - ✅ messaging.destination (recommended) (1 pt)
      
      **RPC Semantic Conventions (5 points):**
      - ✅ rpc.system (required) (2 pts)
      - ✅ rpc.service (required) (2 pts)
      - ✅ rpc.method (recommended) (1 pt)
      
      ### Category 4: Sampling Strategy (10 points)
      
      **Configured (5 points):**
      - ✅ Sampling configured (not 100%) (5 pts)
      - ❌ No sampling (0 pts)
      
      **Documented (3 points):**
      - ✅ Strategy documented (3 pts)
      - What gets sampled and why
      
      **Error Capture (2 points):**
      - ✅ 100% of errors sampled (2 pts)
      - ❌ Errors dropped by sampling (0 pts)
      
      ### Category 5: Cardinality Management (10 points)
      
      **Unbounded Attributes Identified (3 points):**
      - ✅ All unbounded attributes identified (3 pts)
      - user_id, trace_id, timestamps in metrics
      
      **Drop Rules (4 points):**
      - ✅ Drop rules for high-cardinality attributes (4 pts)
      - ❌ No drop rules (0 pts)
      
      **Monitoring (3 points):**
      - ✅ Cardinality monitored (3 pts)
      - Alerts for cardinality spikes
      
      ### Category 6: Production Readiness (5 points)
      
      **Health Checks (2 points):**
      - ✅ Liveness probe (1 pt)
      - ✅ Readiness probe (1 pt)
      
      **High Availability (2 points):**
      - ✅ Multiple replicas (2 pts)
      - ❌ Single replica (0 pts)
      
      **Alerting (1 point):**
      - ✅ Alerts for instrumentation failures (1 pt)
      
      ## Scoring Execution
      
      Analyze the service and calculate score:
````bash
      # 1. Check for traces
      # Query backend for service traces
      # Verify HTTP, DB, external calls are captured
      
      # 2. Check for metrics
      # Verify RED metrics exist (Rate, Errors, Duration)
      
      # 3. Check logs
      # Sample logs and verify trace_id presence
      
      # 4. Check semantic conventions
      # Validate attribute names against spec
      
      # 5. Check sampling
      # Review configuration
      
      # 6. Check cardinality
      # Count unique metric series
````
      
