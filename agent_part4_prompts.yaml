  # PART 4: INSTRUMENTATION & COLLECTOR PROMPTS
  # ═══════════════════════════════════════════════════════

  - id: adjust-instrumentation
    content: |
      Configure OpenTelemetry SDK instrumentation for application with proper settings.
      
      ## Step 1: Identify Application Stack
      
      Determine:
      - Programming language (Go, Python, Java, Node.js, .NET, Ruby, PHP)
      - Framework (Spring Boot, Django, Express, ASP.NET, Rails, Laravel)
      - Deployment environment (K8s, Docker, VM, serverless)
      - Existing instrumentation (if any)
      
      ## Step 2: Choose Instrumentation Method
      
      ### Auto-Instrumentation (Recommended for most cases)
      
      **When to use:**
      - Starting fresh
      - Standard frameworks (Spring Boot, Django, Express)
      - Kubernetes deployment
      - Want zero code changes
      
      **Options:**
      - **Kubernetes Operator** - Best for K8s
      - **eBPF** - Zero code change, works for compiled languages
      - **Language agents** - Bytecode injection (Java, .NET, Python, Node.js)
      
      ### Manual Instrumentation
      
      **When to use:**
      - Custom business logic needs instrumentation
      - Fine-grained control required
      - Performance-critical paths
      - Non-standard frameworks
      
      ## Step 3: Configure Required Attributes
      
      ### Resource Attributes (REQUIRED)
      
      These identify the service:
````yaml
      # Environment variables (works for all languages)
      env:
        - name: OTEL_SERVICE_NAME
          value: "payment-service"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.version=1.2.3,deployment.environment=production,service.namespace=ecommerce"
````
      
      **Required attributes:**
      - `service.name` - Service identifier
      - `service.version` - Version (for deployment tracking)
      - `deployment.environment` - Environment (dev, staging, prod)
      
      **Recommended attributes:**
      - `service.namespace` - Logical grouping (e.g., team, product)
      - `service.instance.id` - Unique instance identifier
      
      ## Step 4: Configure Exporter
      
      Point to OpenTelemetry Collector:
````yaml
      env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otelcol:4317"  # gRPC
        # OR
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otelcol:4318"  # HTTP
        
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"  # or "http/protobuf"
````
      
      ## Step 5: Enable Trace Context in Logs
      
      ### Go (with logrus)
````go
      package main
      
      import (
          "context"
          "github.com/sirupsen/logrus"
          "go.opentelemetry.io/otel"
          "go.opentelemetry.io/otel/trace"
      )
      
      func setupLogging() {
          logrus.SetFormatter(&logrus.JSONFormatter{
              FieldMap: logrus.FieldMap{
                  logrus.FieldKeyTime:  "timestamp",
                  logrus.FieldKeyLevel: "severity",
                  logrus.FieldKeyMsg:   "message",
              },
          })
      }
      
      func logWithTrace(ctx context.Context, msg string) {
          span := trace.SpanFromContext(ctx)
          spanContext := span.SpanContext()
          
          logrus.WithFields(logrus.Fields{
              "trace_id": spanContext.TraceID().String(),
              "span_id":  spanContext.SpanID().String(),
              "trace_flags": spanContext.TraceFlags().String(),
          }).Info(msg)
      }
      
      // Usage
      func handleRequest(ctx context.Context) {
          logWithTrace(ctx, "Processing payment request")
      }
````
      
      ### Python (with structlog)
````python
      import logging
      import structlog
      from opentelemetry import trace
      from opentelemetry.instrumentation.logging import LoggingInstrumentor
      
      # Auto-inject trace context
      LoggingInstrumentor().instrument(set_logging_format=True)
      
      # Configure structlog
      structlog.configure(
          processors=[
              structlog.stdlib.add_log_level,
              structlog.stdlib.add_logger_name,
              structlog.processors.TimeStamper(fmt="iso"),
              structlog.processors.StackInfoRenderer(),
              structlog.processors.format_exc_info,
              structlog.processors.JSONRenderer()
          ],
          wrapper_class=structlog.stdlib.BoundLogger,
          context_class=dict,
          logger_factory=structlog.stdlib.LoggerFactory(),
      )
      
      logger = structlog.get_logger()
      
      # Trace context automatically added to logs
      logger.info("processing_payment", user_id="123", amount=99.99)
      # Output: {"event": "processing_payment", "trace_id": "abc...", "span_id": "def...", ...}
````
      
      ### Java (Spring Boot with Logback)
````xml
      <!-- logback-spring.xml -->
      <configuration>
          <appender name="JSON" class="ch.qos.logback.core.ConsoleAppender">
              <encoder class="net.logstash.logback.encoder.LogstashEncoder">
                  <includeMdcKeyName>trace_id</includeMdcKeyName>
                  <includeMdcKeyName>span_id</includeMdcKeyName>
                  <includeMdcKeyName>trace_flags</includeMdcKeyName>
              </encoder>
          </appender>
          
          <root level="INFO">
              <appender-ref ref="JSON"/>
          </root>
      </configuration>
````
````properties
      # application.properties
      logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg trace_id=%X{trace_id} span_id=%X{span_id}%n
````
      
      ### Node.js (with Winston)
````javascript
      const winston = require('winston');
      const { trace } = require('@opentelemetry/api');
      
      const logger = winston.createLogger({
        format: winston.format.combine(
          winston.format.timestamp(),
          winston.format.printf(info => {
            const span = trace.getActiveSpan();
            const spanContext = span?.spanContext();
            
            return JSON.stringify({
              timestamp: info.timestamp,
              level: info.level,
              message: info.message,
              trace_id: spanContext?.traceId || '',
              span_id: spanContext?.spanId || '',
              ...info
            });
          })
        ),
        transports: [new winston.transports.Console()]
      });
      
      // Usage
      logger.info('Processing payment', { user_id: '123', amount: 99.99 });
````
      
      ## Step 6: Configure Sampling
      
      ### Head-Based Sampling (Simple)
````yaml
      env:
        - name: OTEL_TRACES_SAMPLER
          value: "traceidratio"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "0.1"  # 10% sampling
````
      
      ### Parent-Based Sampling (Better)
````yaml
      env:
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_traceidratio"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "0.1"  # 10% sampling, but always follows parent decision
````
      
      **Note:** For production, use tail-based sampling in collector instead
      
      ## Step 7: Enable Exemplars (Metrics → Traces)
      
      ### Go
````go
      import (
          "go.opentelemetry.io/otel/sdk/metric"
      )
      
      func setupMetrics() *metric.MeterProvider {
          return metric.NewMeterProvider(
              metric.WithReader(
                  metric.NewPeriodicReader(exporter),
              ),
              // Exemplars automatically enabled for histograms
          )
      }
````
      
      ### Python
````python
      from opentelemetry.sdk.metrics import MeterProvider
      from opentelemetry.sdk.metrics.export import PeriodicExportingMetricReader
      
      # Exemplars automatically enabled
      meter_provider = MeterProvider(
          metric_readers=[
              PeriodicExportingMetricReader(exporter)
          ]
      )
````
      
      ## Complete Configuration Examples
      
      ### Kubernetes Operator (Auto-Instrumentation)
````yaml
      # 1. Create Instrumentation resource
      apiVersion: opentelemetry.io/v1alpha1
      kind: Instrumentation
      metadata:
        name: app-instrumentation
        namespace: default
      spec:
        exporter:
          endpoint: http://otelcol.observability.svc.cluster.local:4317
        propagators:
          - tracecontext
          - baggage
        sampler:
          type: parentbased_traceidratio
          argument: "0.1"
        
        # Java auto-instrumentation
        java:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:latest
          env:
            - name: OTEL_JAVAAGENT_LOGGING
              value: "application"
        
        # Python auto-instrumentation
        python:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:latest
        
        # Node.js auto-instrumentation
        nodejs:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:latest
        
        # .NET auto-instrumentation
        dotnet:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:latest
        
        # Go - requires manual SDK (no auto-instrumentation yet)
        go:
          image: ghcr.io/open-telemetry/opentelemetry-go-instrumentation/autoinstrumentation-go:latest
      
      ---
      # 2. Annotate deployment
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: payment-service
      spec:
        template:
          metadata:
            annotations:
              instrumentation.opentelemetry.io/inject-java: "true"
              # OR for Python: instrumentation.opentelemetry.io/inject-python: "true"
              # OR for Node.js: instrumentation.opentelemetry.io/inject-nodejs: "true"
              # OR for .NET: instrumentation.opentelemetry.io/inject-dotnet: "true"
          spec:
            containers:
            - name: app
              image: myapp:latest
              env:
                - name: OTEL_SERVICE_NAME
                  value: "payment-service"
                - name: OTEL_RESOURCE_ATTRIBUTES
                  value: "service.version=1.2.3,deployment.environment=production"
````
      
      ### Manual SDK - Go Example
````go
      package main
      
      import (
          "context"
          "log"
          
          "go.opentelemetry.io/otel"
          "go.opentelemetry.io/otel/attribute"
          "go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc"
          "go.opentelemetry.io/otel/propagation"
          "go.opentelemetry.io/otel/sdk/resource"
          sdktrace "go.opentelemetry.io/otel/sdk/trace"
          semconv "go.opentelemetry.io/otel/semconv/v1.24.0"
      )
      
      func initTracer() func() {
          ctx := context.Background()
          
          // Configure exporter
          exporter, err := otlptracegrpc.New(ctx,
              otlptracegrpc.WithEndpoint("otelcol:4317"),
              otlptracegrpc.WithInsecure(),
          )
          if err != nil {
              log.Fatal(err)
          }
          
          // Configure resource
          res, err := resource.New(ctx,
              resource.WithAttributes(
                  semconv.ServiceName("payment-service"),
                  semconv.ServiceVersion("1.2.3"),
                  semconv.DeploymentEnvironment("production"),
                  attribute.String("service.namespace", "ecommerce"),
              ),
          )
          if err != nil {
              log.Fatal(err)
          }
          
          // Configure tracer provider
          tp := sdktrace.NewTracerProvider(
              sdktrace.WithBatcher(exporter),
              sdktrace.WithResource(res),
              sdktrace.WithSampler(sdktrace.ParentBased(
                  sdktrace.TraceIDRatioBased(0.1), // 10% sampling
              )),
          )
          
          otel.SetTracerProvider(tp)
          otel.SetTextMapPropagator(
              propagation.NewCompositeTextMapPropagator(
                  propagation.TraceContext{},
                  propagation.Baggage{},
              ),
          )
          
          return func() {
              _ = tp.Shutdown(ctx)
          }
      }
      
      func main() {
          shutdown := initTracer()
          defer shutdown()
          
          // Your application code
      }
````
      
      ### Manual SDK - Python Example
````python
      from opentelemetry import trace
      from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
      from opentelemetry.sdk.trace import TracerProvider
      from opentelemetry.sdk.trace.export import BatchSpanProcessor
      from opentelemetry.sdk.resources import Resource
      from opentelemetry.semconv.resource import ResourceAttributes
      
      def init_tracer():
          # Configure resource
          resource = Resource.create({
              ResourceAttributes.SERVICE_NAME: "payment-service",
              ResourceAttributes.SERVICE_VERSION: "1.2.3",
              ResourceAttributes.DEPLOYMENT_ENVIRONMENT: "production",
              "service.namespace": "ecommerce",
          })
          
          # Configure tracer provider
          provider = TracerProvider(resource=resource)
          
          # Configure exporter
          otlp_exporter = OTLPSpanExporter(
              endpoint="http://otelcol:4317",
              insecure=True,
          )
          
          # Add batch processor
          provider.add_span_processor(
              BatchSpanProcessor(otlp_exporter)
          )
          
          # Set as global
          trace.set_tracer_provider(provider)
      
      if __name__ == "__main__":
          init_tracer()
          # Your application code
````
      
