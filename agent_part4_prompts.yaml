      Before deploying to production:
      
      - [ ] Required resource attributes set (service.name, service.version, deployment.environment)
      - [ ] Trace context in logs enabled
      - [ ] Sampling configured (not 100%)
      - [ ] Exporter pointing to collector (not directly to backend)
      - [ ] Health checks configured
      - [ ] Instrumentation score ≥ 85
      - [ ] Tested in staging
      - [ ] Rollback plan ready
      
